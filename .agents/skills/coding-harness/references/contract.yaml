schema_version: "1.1"

purpose: >
  Install, initialize, update, and verify @brainwav/coding-harness usage in real
  repositories, while clearly communicating capability boundaries, required checks,
  and setup requirements.

triggers:
  - User asks to install, set up, update, or verify coding-harness.
  - User asks what coding-harness can and cannot do.
  - User asks to keep Codex environment action blocks aligned with current project scripts.

inputs:
  - Target repository path.
  - Install preference (global vs project-local).
  - Current harness state (new install, existing setup, update required, or broken).
  - Auth mode for remote checks (token/JWT + owner/repo when applicable).

outputs:
  - setup_summary: markdown summary of actions taken and key decisions.
  - validation_report:
      schema_version: "1.0"
      fields:
        - command
        - status
        - evidence
  - capability_boundary_report:
      schema_version: "1.0"
      sections:
        - can_do
        - cannot_do
        - requires_user_input

non_goals:
  - Building unrelated app/product features.
  - Performing full security audits outside harness governance scope.
  - Managing credential generation or long-term secret storage.

guardrails:
  - Require explicit approval before destructive or high-impact operations.
  - Redact tokens/secrets in logs and summaries.
  - Fail fast on first blocking validation gate and report exact remediation.
  - Do not claim full setup success without command evidence.

risks:
  - Treating stale local docs as source of truth instead of `harness --help` and repo files.
  - Overwriting user-owned environment configuration.
  - Misreporting capabilities when remote checks were skipped due to missing auth.
