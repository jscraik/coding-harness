version: 2.1

jobs:
  pr-pipeline:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            if ! command -v pnpm >/dev/null 2>&1; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              npm install --global pnpm@10.0.0
            fi
            pnpm --version
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Docs and Workflow Contracts
          command: |
            pnpm docs:lint
            pnpm workflow:validate
      - run:
          name: Lint
          command: pnpm lint
      - run:
          name: Typecheck
          command: pnpm typecheck
      - run:
          name: Test
          command: |
            mkdir -p test-results/vitest
            pnpm vitest run --pool=forks --reporter=default --reporter=junit --outputFile.junit=test-results/vitest/junit.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
      - run:
          name: Audit
          command: pnpm audit

workflows:
  pr-pipeline:
    jobs:
      - pr-pipeline
