version: 2.1

jobs:
  run-governance-check:
    docker:
      # Pinned to specific minor for reproducibility (JSC-115)
      - image: cimg/node:24.13
    resource_class: small
    parameters:
      check_name:
        type: string
      command:
        type: string
    steps:
      - checkout
      - run:
          name: Verify GH token wiring
          command: |
            if [ -n "${GH_TOKEN:-}" ]; then
              echo "GH_TOKEN is already available for gh-backed steps."
            elif [ -n "${GITHUB_TOKEN:-}" ]; then
              export GH_TOKEN="${GITHUB_TOKEN}"
              echo 'export GH_TOKEN="${GITHUB_TOKEN}"' >> "$BASH_ENV"
              echo "Promoted GITHUB_TOKEN to GH_TOKEN for gh-backed steps."
            elif [ -n "${GITHUB_PERSONAL_ACCESS_TOKEN:-}" ]; then
              export GH_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"
              export GITHUB_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"
              echo 'export GH_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"' >> "$BASH_ENV"
              echo 'export GITHUB_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"' >> "$BASH_ENV"
              echo "Promoted GITHUB_PERSONAL_ACCESS_TOKEN to GH_TOKEN/GITHUB_TOKEN for gh-backed steps."
            else
              echo "GH_TOKEN/GITHUB_PERSONAL_ACCESS_TOKEN not set; gh-backed steps may fail."
            fi
      - run:
          name: Ensure baseline shell tools
          command: |
            packages=()
            if ! command -v gh >/dev/null 2>&1; then
              packages+=("gh")
            fi
            if ! command -v rg >/dev/null 2>&1; then
              packages+=("ripgrep")
            fi
            if ! command -v fd >/dev/null 2>&1 && ! command -v fdfind >/dev/null 2>&1; then
              packages+=("fd-find")
            fi
            if ! command -v jq >/dev/null 2>&1; then
              packages+=("jq")
            fi
            if ! command -v make >/dev/null 2>&1; then
              packages+=("make")
            fi
            if ! command -v realpath >/dev/null 2>&1; then
              packages+=("coreutils")
            fi
            if (( ${#packages[@]} > 0 )); then
              sudo apt-get update
              sudo apt-get install -y "${packages[@]}"
            fi
            gh --version
            if ! command -v fd >/dev/null 2>&1 && command -v fdfind >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              ln -sf "$(command -v fdfind)" "$HOME/.local/bin/fd"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              export PATH="$HOME/.local/bin:$PATH"
            fi
            rg --version
            fd --version
            jq --version
            make --version
            realpath --version
      - run:
          name: Ensure mise available
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            if ! command -v mise >/dev/null 2>&1; then
              curl -fsSL https://mise.run | sh
            fi
            mise trust --yes .mise.toml
            mise --version
      - run:
          name: Ensure pnpm available
          command: |
            required_pnpm_version="10.33.0"
            current_pnpm_version=""
            if command -v pnpm >/dev/null 2>&1; then
              current_pnpm_version="$(pnpm --version || true)"
            fi
            if [[ "$current_pnpm_version" != "$required_pnpm_version" ]]; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              echo 'export NPM_CONFIG_PREFIX="$HOME/.local"' >> "$BASH_ENV"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              npm install --global --prefix "$NPM_CONFIG_PREFIX" "pnpm@${required_pnpm_version}"
            fi
            pnpm --version
      - run:
          name: Configure pnpm store
          command: |
            mkdir -p "$HOME/.pnpm-store"
            pnpm config set store-dir "$HOME/.pnpm-store"
            pnpm store path
      - restore_cache:
          keys:
            - v2-pnpm-store-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - v2-pnpm-store-{{ arch }}-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: v2-pnpm-store-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
      - run:
          name: Ensure test-results directory exists
          when: always
          command: |
            mkdir -p artifacts/test-results
      - run:
          name: << parameters.check_name >>
          command: << parameters.command >>
      - store_test_results:
          path: artifacts/test-results
          when: always
      - store_artifacts:
          path: artifacts/test-results
          when: always

workflows:
  pr-pipeline:
    jobs:
      - run-governance-check:
          name: pr-template
          check_name: pr-template
          command: |
            pr_ref="${CIRCLE_PULL_REQUEST:-}"
            if [[ -z "$pr_ref" && -n "${CIRCLE_BRANCH:-}" ]]; then
              pr_ref="$(gh pr list --head "$CIRCLE_BRANCH" --state open --json url --jq '.[0].url // ""')"
            fi
            if [[ -z "$pr_ref" ]]; then
              echo "Error: unable to resolve pull request context for pr-template."
              exit 1
            fi
            export PR_TEMPLATE_BODY
            PR_TEMPLATE_BODY="$(gh pr view "$pr_ref" --json body --jq .body)"
            pnpm exec tsx src/cli.ts pr-template-gate --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: linear-gate
          check_name: linear-gate
          requires:
            - pr-template
          command: |
            pr_ref="${CIRCLE_PULL_REQUEST:-}"
            if [[ -z "$pr_ref" && -n "${CIRCLE_BRANCH:-}" ]]; then
              pr_ref="$(gh pr list --head "$CIRCLE_BRANCH" --state open --json url --jq '.[0].url // ""')"
            fi
            if [[ -z "$pr_ref" ]]; then
              echo "Error: unable to resolve pull request context for linear-gate."
              exit 1
            fi
            branch_name="$(gh pr view "$pr_ref" --json headRefName --jq .headRefName)"
            pr_title="$(gh pr view "$pr_ref" --json title --jq .title)"
            pr_body="$(gh pr view "$pr_ref" --json body --jq .body)"
            pnpm exec tsx src/cli.ts linear-gate \
              --branch "$branch_name" \
              --pr-title "$pr_title" \
              --pr-body "$pr_body" \
              --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: risk-policy-gate
          check_name: risk-policy-gate
          requires:
            - pr-template
            - linear-gate
          command: bash scripts/run-harness-gate.sh policy-gate --max-tier medium --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: dependency-scan
          check_name: dependency-scan
          command: pnpm audit:strict
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: orb-pinning
          check_name: orb-pinning
          command: |
            mise install
            mise exec -- bash scripts/check-environment.sh
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: docs-gate
          check_name: docs-gate
          command: bash scripts/run-harness-gate.sh docs-gate --mode required --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: lint
          check_name: lint
          command: pnpm lint
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: typecheck
          check_name: typecheck
          command: pnpm typecheck
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: test
          check_name: test
          command: pnpm test:ci
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: audit
          check_name: audit
          command: pnpm audit
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: check
          check_name: check
          command: pnpm check
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: memory
          check_name: memory
          command: bash scripts/run-harness-gate.sh memory-gate --json
          filters:
            tags:
              ignore: /.*/

  security-scan:
    jobs:
      - run-governance-check:
          name: security-scan
          check_name: security-scan
          command: bash scripts/check-semgrep-full.sh
          filters:
            tags:
              ignore: /.*/
