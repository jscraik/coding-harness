version: 2.1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # PR pipeline (fast) — lint, typecheck, audit, and the full test suite
  # excluding the slow pilot-evaluate suite.
  #
  # resource_class: large (4 vCPU / 8 GB) — required because ci-migrate.test.ts
  # runs 97 RSA-signing tests (~233s). On medium (2 vCPU) the vitest birpc IPC
  # onTaskUpdate call stalls past the 60s timeout under CPU contention.
  # ─────────────────────────────────────────────────────────────────────────────
  pr-fast:
    docker:
      - image: cimg/node:24.13
    resource_class: large
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            required_pnpm_version="10.0.0"
            current_pnpm_version=""
            if command -v pnpm >/dev/null 2>&1; then
              current_pnpm_version="$(pnpm --version || true)"
            fi
            if [[ "$current_pnpm_version" != "$required_pnpm_version" ]]; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              echo 'export NPM_CONFIG_PREFIX="$HOME/.local"' >> "$BASH_ENV"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              npm install --global --prefix "$NPM_CONFIG_PREFIX" "pnpm@${required_pnpm_version}"
            fi
            pnpm --version
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Lint
          command: pnpm lint
      - run:
          name: Typecheck
          command: pnpm typecheck
      - run:
          name: Test (excluding pilot-evaluate)
          no_output_timeout: 12m
          # Excludes the slow pilot-evaluate suite; it runs in pr-slow.
          # ci-migrate.test.ts alone runs ~233s of RSA signing and needs the
          # isolated worker-timeout mitigation from scripts/test-ci.sh.
          command: |
            pnpm exec vitest run --maxWorkers=1 --exclude '**/pilot-evaluate.test.ts' --exclude src/commands/ci-migrate.test.ts
            pnpm exec vitest run --maxWorkers=1 --dangerouslyIgnoreUnhandledErrors src/commands/ci-migrate.test.ts
      - run:
          name: Audit
          command: pnpm audit
      - run:
          name: Docs lint
          command: pnpm docs:lint
      - run:
          name: Skill + workflow validation
          command: pnpm skill:validate && pnpm workflow:validate

  # ─────────────────────────────────────────────────────────────────────────────
  # PR pipeline (slow) — isolated pilot-evaluate suite.
  #
  # pilot-evaluate.test.ts runs long-running evaluation windows and RSA signing
  # loops. On large (4 vCPU) the vitest worker IPC can time out when run
  # alongside other heavy suites. Isolated here on xlarge with its own timeout.
  # ─────────────────────────────────────────────────────────────────────────────
  pr-slow:
    docker:
      - image: cimg/node:24.13
    resource_class: large
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            required_pnpm_version="10.0.0"
            current_pnpm_version=""
            if command -v pnpm >/dev/null 2>&1; then
              current_pnpm_version="$(pnpm --version || true)"
            fi
            if [[ "$current_pnpm_version" != "$required_pnpm_version" ]]; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              echo 'export NPM_CONFIG_PREFIX="$HOME/.local"' >> "$BASH_ENV"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              npm install --global --prefix "$NPM_CONFIG_PREFIX" "pnpm@${required_pnpm_version}"
            fi
            pnpm --version
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Test (pilot-evaluate only)
          no_output_timeout: 20m
          command: pnpm exec vitest run src/commands/pilot-evaluate.test.ts

  # Canonical PR status aggregator — preserves the historical CircleCI
  # `pr-pipeline` status context that branch protection and harness metadata
  # expect, while still letting the fast/slow jobs run independently.
  pr-pipeline:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
          name: Aggregate PR pipeline status
          command: echo "pr-fast and pr-slow completed successfully"

  # ─────────────────────────────────────────────────────────────────────────────
  # Release pipeline — tag-driven publish only (no CI-side pushes to main)
  #
  # Required CircleCI environment variables (set in Project Settings → Env Vars):
  #   NPM_TOKEN                    — npm access token with publish rights to @brainwav scope
  #
  # Flow:
  #   1. Validate release context + secrets
  #   2. Run full pnpm check suite
  #   3. Verify tag matches package.json version
  #   4. Build and publish to npm
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    docker:
      - image: cimg/node:24.13
    resource_class: large
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            required_pnpm_version="10.0.0"
            current_pnpm_version=""
            if command -v pnpm >/dev/null 2>&1; then
              current_pnpm_version="$(pnpm --version || true)"
            fi
            if [[ "$current_pnpm_version" != "$required_pnpm_version" ]]; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              echo 'export NPM_CONFIG_PREFIX="$HOME/.local"' >> "$BASH_ENV"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              npm install --global --prefix "$NPM_CONFIG_PREFIX" "pnpm@${required_pnpm_version}"
            fi
            pnpm --version
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Validate release secrets
          command: |
            missing=()
            [ -z "$NPM_TOKEN" ]                    && missing+=("NPM_TOKEN")
            if [ ${#missing[@]} -gt 0 ]; then
              echo "ERROR: Missing required environment variables: ${missing[*]}"
              echo "Configure them in CircleCI Project Settings -> Environment Variables."
              echo "  NPM_TOKEN                    - npm token with publish rights to @brainwav scope"
              exit 1
            fi
            if [ -z "${CIRCLE_TAG:-}" ]; then
              echo "ERROR: release workflow must run on a git tag (CIRCLE_TAG is empty)."
              exit 1
            fi
            echo "Release secrets validated"
      - run:
          name: Full check suite
          no_output_timeout: 15m
          command: pnpm check
      - run:
          name: Verify tag matches package version
          command: |
            PKG_VERSION="$(jq -r '.version' package.json)"
            TAG_VERSION="${CIRCLE_TAG#v}"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "ERROR: Tag ${CIRCLE_TAG} does not match package.json version ${PKG_VERSION}"
              exit 1
            fi
            echo "Tag/version match confirmed: ${CIRCLE_TAG}"
      - run:
          name: Verify tagged commit is reachable from origin/main
          command: |
            git fetch --no-tags origin main:refs/remotes/origin/main
            if ! git merge-base --is-ancestor "$CIRCLE_SHA1" "refs/remotes/origin/main"; then
              echo "ERROR: Tagged commit ${CIRCLE_SHA1} is not reachable from origin/main"
              exit 1
            fi
            echo "Tag commit ancestry check passed against origin/main"
      - run:
          name: Build package
          command: pnpm build
      - run:
          name: Publish to npm
          command: |
            VERSION="$(jq -r '.version' package.json)"
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
            pnpm publish --access restricted --ignore-scripts
            echo "Published @brainwav/coding-harness@${VERSION}"

workflows:
  # Runs on every PR branch push (all branches except main).
  # pr-fast and pr-slow run in parallel, then the no-op pr-pipeline aggregator
  # publishes the canonical PR status context used by branch protection.
  pr-workflow:
    jobs:
      - pr-fast:
          filters:
            branches:
              ignore: main
      - pr-slow:
          filters:
            branches:
              ignore: main
      - pr-pipeline:
          requires:
            - pr-fast
            - pr-slow
          filters:
            branches:
              ignore: main

  # Runs only for semver tags (vX.Y.Z...), never on branch pushes.
  release-workflow:
    jobs:
      - release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$/
