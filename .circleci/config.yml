version: 2.1

jobs:
  run-governance-check:
    docker:
      # Pinned to specific minor for reproducibility (JSC-115)
      - image: cimg/node:26.3.0
    resource_class: small
    parameters:
      check_name:
        type: string
      command:
        type: string
      skip_dependency_bootstrap:
        type: boolean
        default: false
    steps:
      - checkout
      - run:
          name: Fetch comparison base
          command: |
            git fetch --no-tags --depth=200 origin +main:refs/remotes/origin/main || \
              git fetch --no-tags origin +main:refs/remotes/origin/main
      - run:
          name: Verify GH token wiring
          command: |
            if [ -n "${GH_TOKEN:-}" ]; then
              echo "GH_TOKEN is already available for gh-backed steps."
            elif [ -n "${GITHUB_TOKEN:-}" ]; then
              export GH_TOKEN="${GITHUB_TOKEN}"
              echo 'export GH_TOKEN="${GITHUB_TOKEN}"' >> "$BASH_ENV"
              echo "Promoted GITHUB_TOKEN to GH_TOKEN for gh-backed steps."
            elif [ -n "${GITHUB_PERSONAL_ACCESS_TOKEN:-}" ]; then
              export GH_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"
              export GITHUB_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"
              echo 'export GH_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"' >> "$BASH_ENV"
              echo 'export GITHUB_TOKEN="${GITHUB_PERSONAL_ACCESS_TOKEN}"' >> "$BASH_ENV"
              echo "Promoted GITHUB_PERSONAL_ACCESS_TOKEN to GH_TOKEN/GITHUB_TOKEN for gh-backed steps."
            else
              echo "GH_TOKEN/GITHUB_TOKEN/GITHUB_PERSONAL_ACCESS_TOKEN not set; gh-backed steps may fail."
            fi
      - run:
          name: Ensure baseline shell tools
          command: |
            packages=()
            if ! command -v gh >/dev/null 2>&1; then
              packages+=("gh")
            fi
            if ! command -v rg >/dev/null 2>&1; then
              packages+=("ripgrep")
            fi
            if ! command -v fd >/dev/null 2>&1 && ! command -v fdfind >/dev/null 2>&1; then
              packages+=("fd-find")
            fi
            if ! command -v jq >/dev/null 2>&1; then
              packages+=("jq")
            fi
            if ! command -v make >/dev/null 2>&1; then
              packages+=("make")
            fi
            if ! command -v realpath >/dev/null 2>&1; then
              packages+=("coreutils")
            fi
            if (( ${#packages[@]} > 0 )); then
              sudo apt-get update
              sudo apt-get install -y "${packages[@]}"
            fi
            gh --version
            if ! command -v fd >/dev/null 2>&1 && command -v fdfind >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              ln -sf "$(command -v fdfind)" "$HOME/.local/bin/fd"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              export PATH="$HOME/.local/bin:$PATH"
            fi
            rg --version
            fd --version
            jq --version
            make --version
            realpath --version
      - run:
          name: Ensure mise available
          command: |
            retry_cmd() {
              local max_attempts="${1:-3}"
              shift
              local attempt=1
              until "$@"; do
                if (( attempt >= max_attempts )); then
                  return 1
                fi
                local sleep_seconds=$(( attempt * 5 ))
                echo "Command failed (attempt ${attempt}/${max_attempts}): $*"
                echo "Retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
                attempt=$(( attempt + 1 ))
              done
            }
            export MISE_VERSION="v2025.1.5"
            echo 'export MISE_VERSION="v2025.1.5"' >> "$BASH_ENV"
            export PATH="$HOME/.local/bin:$PATH"
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            current_mise_version=""
            if command -v mise >/dev/null 2>&1; then
              current_mise_version="$(mise --version | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
            fi
            if [[ "$current_mise_version" != "${MISE_VERSION#v}" ]]; then
              retry_cmd 3 bash -c 'curl -fsSL https://mise.run | sh'
            fi
            mise trust --yes .mise.toml
            mise --version
      - run:
          name: Ensure pnpm available
          command: |
            required_pnpm_version="10.33.0"
            current_pnpm_version=""
            if command -v pnpm >/dev/null 2>&1; then
              current_pnpm_version="$(pnpm --version || true)"
            fi
            if [[ "$current_pnpm_version" != "$required_pnpm_version" ]]; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              echo 'export NPM_CONFIG_PREFIX="$HOME/.local"' >> "$BASH_ENV"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              npm install --global --prefix "$NPM_CONFIG_PREFIX" "pnpm@${required_pnpm_version}"
            fi
            pnpm --version
      - run:
          name: Ensure uv available
          command: |
            retry_cmd() {
              local max_attempts="${1:-3}"
              shift
              local attempt=1
              until "$@"; do
                if (( attempt >= max_attempts )); then
                  return 1
                fi
                local sleep_seconds=$(( attempt * 5 ))
                echo "Command failed (attempt ${attempt}/${max_attempts}): $*"
                echo "Retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
                attempt=$(( attempt + 1 ))
              done
            }
            export PATH="$HOME/.local/bin:$PATH"
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            retry_cmd 3 mise install uv
            uv_path="$(mise which uv)"
            if [[ -z "$uv_path" ]]; then
              echo "Error: mise which uv returned nothing" >&2
              exit 1
            fi
            mkdir -p "$HOME/.local/bin"
            ln -sf "$uv_path" "$HOME/.local/bin/uv"
            uv --version
      - when:
          condition:
            not: << parameters.skip_dependency_bootstrap >>
          steps:
            - run:
                name: Configure pnpm store
                command: |
                  mkdir -p "$HOME/.pnpm-store"
                  pnpm config set store-dir "$HOME/.pnpm-store"
                  pnpm store path
            - restore_cache:
                keys:
                  - v2-pnpm-store-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
                  - v2-pnpm-store-{{ arch }}-
            - run:
                name: Install dependencies
                command: pnpm install --frozen-lockfile --prefer-offline
            - save_cache:
                key: v2-pnpm-store-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
                paths:
                  - ~/.pnpm-store
      - run:
          name: Ensure test-results directory exists
          when: always
          command: |
            mkdir -p artifacts/test-results
      - run:
          name: << parameters.check_name >>
          no_output_timeout: 30m
          command: << parameters.command >>
      - store_test_results:
          path: artifacts/test-results
          when: always
      - store_artifacts:
          path: artifacts/test-results
          when: always

  snyk-dependency-scan:
    docker:
      # Pinned to specific minor for reproducibility (JSC-115)
      - image: cimg/node:26.3.0
    resource_class: small
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            required_pnpm_version="10.33.0"
            current_pnpm_version=""
            if command -v pnpm >/dev/null 2>&1; then
              current_pnpm_version="$(pnpm --version || true)"
            fi
            if [[ "$current_pnpm_version" != "$required_pnpm_version" ]]; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              echo 'export NPM_CONFIG_PREFIX="$HOME/.local"' >> "$BASH_ENV"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              npm install --global --prefix "$NPM_CONFIG_PREFIX" "pnpm@${required_pnpm_version}"
            fi
            pnpm --version
      - run:
          name: Install dependencies for Snyk package graph
          command: pnpm install --frozen-lockfile --prefer-offline
      - run:
          name: Run report-only Snyk dependency scan
          command: |
            if [[ -z "${SNYK_TOKEN:-}" ]]; then
              echo "SNYK_TOKEN is not available in this CircleCI job."
              echo "Skipping report-only CircleCI Snyk scan; external GitHub Snyk remains the blocking PR check."
              exit 0
            fi
            if ! command -v snyk >/dev/null 2>&1; then
              npm install --global --prefix "$HOME/.local" snyk || {
                echo "Unable to install Snyk CLI; treating CircleCI Snyk as report-only."
                exit 0
              }
              export PATH="$HOME/.local/bin:$PATH"
            fi
            snyk config set disableSuggestions=true || true
            if ! snyk auth "$SNYK_TOKEN"; then
              echo "Snyk auth failed; treating CircleCI Snyk as report-only."
              echo "External GitHub Snyk remains the blocking PR dependency-delta check."
              exit 0
            fi
            snyk test --severity-threshold=high --file=package.json --package-manager=pnpm || true

workflows:
  pr-pipeline:
    jobs:
      - run-governance-check:
          name: pr-template
          check_name: pr-template
          command: |
            repo_slug=""
            if [[ -n "${CIRCLE_PROJECT_USERNAME:-}" && -n "${CIRCLE_PROJECT_REPONAME:-}" ]]; then
              repo_slug="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
            fi
            if [[ -z "$repo_slug" ]]; then
              if [[ -n "$CIRCLE_REPOSITORY_URL" ]]; then
                repo_slug="$(printf '%s' "$CIRCLE_REPOSITORY_URL" | sed 's#^https://github.com/##; s#^git@github.com:/##; s#^git@github.com:##; s#\.git$##')"
              fi
            fi
            if [[ -z "$repo_slug" ]]; then
              remote_url="$(git config --get remote.origin.url 2>/dev/null || true)"
              if [[ -n "$remote_url" ]]; then
                repo_slug="$(printf '%s' "$remote_url" | sed 's#^https://github.com/##; s#^git@github.com:/##; s#^git@github.com:##; s#\.git$##')"
              fi
            fi
            if [[ -z "$repo_slug" ]]; then
              repo_slug="$(gh repo view --json nameWithOwner --jq '.nameWithOwner // ""' 2>/dev/null || true)"
            fi
            gh_repo_args=()
            if [[ -n "$repo_slug" ]]; then
              gh_repo_args=(--repo "$repo_slug")
            fi
            resolve_pr_ref() {
              local resolved="${CIRCLE_PULL_REQUEST:-}"
              local attempt=1
              while [[ -z "$resolved" && "$attempt" -le 6 ]]; do
                if [[ -z "$resolved" && -n "${CIRCLE_PULL_REQUESTS:-}" ]]; then
                  resolved="${CIRCLE_PULL_REQUESTS%%,*}"
                fi
                if [[ -z "$resolved" && -n "${CIRCLE_BRANCH:-}" ]]; then
                  if [[ -n "${CIRCLE_PROJECT_USERNAME:-}" ]]; then
                    resolved="$(gh pr list "${gh_repo_args[@]}" --head "${CIRCLE_PROJECT_USERNAME}:${CIRCLE_BRANCH}" --state open --json url --jq '.[0].url // ""' 2>/dev/null || true)"
                  fi
                fi
                if [[ -z "$resolved" && -n "${CIRCLE_BRANCH:-}" ]]; then
                  resolved="$(gh pr list "${gh_repo_args[@]}" --head "${CIRCLE_BRANCH}" --state open --json url --jq '.[0].url // ""' 2>/dev/null || true)"
                fi
                if [[ -z "$resolved" && -n "${CIRCLE_SHA1:-}" && -n "$repo_slug" ]]; then
                  resolved="$(gh api -H "Accept: application/vnd.github+json" "/repos/${repo_slug}/commits/${CIRCLE_SHA1}/pulls" --jq '([.[] | select(.state == "open")][0].html_url // .[0].html_url // "")' 2>/dev/null || true)"
                fi
                if [[ -z "$resolved" && "$attempt" -lt 6 ]]; then
                  echo "PR context not available yet for pr-template; retrying ($attempt/6)." >&2
                  sleep 10
                fi
                attempt=$(( attempt + 1 ))
              done
              printf '%s' "$resolved"
            }
            pr_ref="$(resolve_pr_ref)"
            if [[ -z "$pr_ref" ]]; then
              echo "Error: unable to resolve pull request context for pr-template."
              exit 1
            fi
            export PR_TEMPLATE_BODY
            PR_TEMPLATE_BODY="$(gh pr view "${gh_repo_args[@]}" "$pr_ref" --json body --jq .body)"
            bash scripts/run-harness-gate.sh pr-template-gate --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: linear-gate
          check_name: linear-gate
          requires:
            - pr-template
          command: |
            repo_slug=""
            if [[ -n "${CIRCLE_PROJECT_USERNAME:-}" && -n "${CIRCLE_PROJECT_REPONAME:-}" ]]; then
              repo_slug="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
            fi
            if [[ -z "$repo_slug" ]]; then
              if [[ -n "$CIRCLE_REPOSITORY_URL" ]]; then
                repo_slug="$(printf '%s' "$CIRCLE_REPOSITORY_URL" | sed 's#^https://github.com/##; s#^git@github.com:/##; s#^git@github.com:##; s#\.git$##')"
              fi
            fi
            if [[ -z "$repo_slug" ]]; then
              remote_url="$(git config --get remote.origin.url 2>/dev/null || true)"
              if [[ -n "$remote_url" ]]; then
                repo_slug="$(printf '%s' "$remote_url" | sed 's#^https://github.com/##; s#^git@github.com:/##; s#^git@github.com:##; s#\.git$##')"
              fi
            fi
            if [[ -z "$repo_slug" ]]; then
              repo_slug="$(gh repo view --json nameWithOwner --jq '.nameWithOwner // ""' 2>/dev/null || true)"
            fi
            gh_repo_args=()
            if [[ -n "$repo_slug" ]]; then
              gh_repo_args=(--repo "$repo_slug")
            fi
            resolve_pr_ref() {
              local resolved="${CIRCLE_PULL_REQUEST:-}"
              local attempt=1
              while [[ -z "$resolved" && "$attempt" -le 6 ]]; do
                if [[ -z "$resolved" && -n "${CIRCLE_PULL_REQUESTS:-}" ]]; then
                  resolved="${CIRCLE_PULL_REQUESTS%%,*}"
                fi
                if [[ -z "$resolved" && -n "${CIRCLE_BRANCH:-}" ]]; then
                  if [[ -n "${CIRCLE_PROJECT_USERNAME:-}" ]]; then
                    resolved="$(gh pr list "${gh_repo_args[@]}" --head "${CIRCLE_PROJECT_USERNAME}:${CIRCLE_BRANCH}" --state open --json url --jq '.[0].url // ""' 2>/dev/null || true)"
                  fi
                fi
                if [[ -z "$resolved" && -n "${CIRCLE_BRANCH:-}" ]]; then
                  resolved="$(gh pr list "${gh_repo_args[@]}" --head "${CIRCLE_BRANCH}" --state open --json url --jq '.[0].url // ""' 2>/dev/null || true)"
                fi
                if [[ -z "$resolved" && -n "${CIRCLE_SHA1:-}" && -n "$repo_slug" ]]; then
                  resolved="$(gh api -H "Accept: application/vnd.github+json" "/repos/${repo_slug}/commits/${CIRCLE_SHA1}/pulls" --jq '([.[] | select(.state == "open")][0].html_url // .[0].html_url // "")' 2>/dev/null || true)"
                fi
                if [[ -z "$resolved" && "$attempt" -lt 6 ]]; then
                  echo "PR context not available yet for linear-gate; retrying ($attempt/6)." >&2
                  sleep 10
                fi
                attempt=$(( attempt + 1 ))
              done
              printf '%s' "$resolved"
            }
            pr_ref="$(resolve_pr_ref)"
            if [[ -z "$pr_ref" ]]; then
              echo "Error: unable to resolve pull request context for linear-gate."
              exit 1
            fi
            branch_name="$(gh pr view "${gh_repo_args[@]}" "$pr_ref" --json headRefName --jq .headRefName)"
            pr_title="$(gh pr view "${gh_repo_args[@]}" "$pr_ref" --json title --jq .title)"
            pr_body="$(gh pr view "${gh_repo_args[@]}" "$pr_ref" --json body --jq .body)"
            linear_gate_args=(
              --pr-title "$pr_title"
              --pr-body "$pr_body"
              --json
            )
            # Check for branch exemptions via pattern or environment variable allowlist.
            # LINEAR_GATE_ALLOW_BRANCHES: comma/space-separated list of branches for temporary exemptions.
            # Use ALLOW_MISSING_BRANCH=1 for ad-hoc one-off exemptions.
            branch_matched=false
            if [[ "$branch_name" =~ ^codex/pr[0-9]+($|[-/]) ]]; then
              echo "linear-gate: allowing missing branch linkage for pattern-matched branch '$branch_name'"
              branch_matched=true
            elif [[ -n "${LINEAR_GATE_ALLOW_BRANCHES:-}" ]]; then
              # Parse comma/space-separated allowlist
              IFS=', ' read -ra allowed_branches < <(printf '%s\n' "${LINEAR_GATE_ALLOW_BRANCHES}")
              for allowed_branch in "${allowed_branches[@]}"; do
                if [[ "$branch_name" == "$allowed_branch" ]]; then
                  echo "linear-gate: TEMPORARY EXEMPTION via LINEAR_GATE_ALLOW_BRANCHES for branch '$branch_name'"
                  branch_matched=true
                  break
                fi
              done
            fi
            if [[ "$branch_matched" == "true" ]]; then
              linear_gate_args=(--allow-missing-branch "${linear_gate_args[@]}")
            elif [[ "${ALLOW_MISSING_BRANCH:-0}" == "1" ]]; then
              echo "linear-gate: allowing missing branch linkage via ALLOW_MISSING_BRANCH=1"
              linear_gate_args=(--allow-missing-branch --branch "" "${linear_gate_args[@]}")
            else
              linear_gate_args=(--branch "$branch_name" "${linear_gate_args[@]}")
            fi
            bash scripts/run-harness-gate.sh linear-gate "${linear_gate_args[@]}"
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: risk-policy-gate
          check_name: risk-policy-gate
          requires:
            - pr-template
            - linear-gate
          command: bash scripts/run-harness-gate.sh policy-gate --max-tier medium --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: dependency-scan
          check_name: dependency-scan
          command: pnpm audit:strict
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: orb-pinning
          check_name: orb-pinning
          command: |
            retry_cmd() {
              local max_attempts="${1:-3}"
              shift
              local attempt=1
              until "$@"; do
                if (( attempt >= max_attempts )); then
                  return 1
                fi
                local sleep_seconds=$(( attempt * 5 ))
                echo "Command failed (attempt ${attempt}/${max_attempts}): $*"
                echo "Retrying in ${sleep_seconds}s..."
                sleep "${sleep_seconds}"
                attempt=$(( attempt + 1 ))
              done
            }
            packages=()
            if ! dpkg -s python3-venv >/dev/null 2>&1; then
              packages+=("python3-venv")
            fi
            if ! dpkg -s python3-pip >/dev/null 2>&1; then
              packages+=("python3-pip")
            fi
            if (( ${#packages[@]} > 0 )); then
              retry_cmd 3 sudo apt-get update
              retry_cmd 3 sudo apt-get install -y "${packages[@]}"
            fi
            mkdir -p "$HOME/.local/bin" "$HOME/.local/share"
            export PATH="$HOME/.local/bin:$PATH"
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            retry_cmd 3 mise install rust@stable
            if [[ -f "$HOME/.cargo/env" ]]; then
              # rustup does not update the current shell PATH for non-interactive jobs.
              . "$HOME/.cargo/env"
            fi
            SEMGREP_VERSION="1.153.1"
            SEMGREP_VENV="$HOME/.local/share/semgrep-venv-${SEMGREP_VERSION}"
            if [[ ! -x "$SEMGREP_VENV/bin/semgrep" ]]; then
              python3 -m venv "$SEMGREP_VENV"
              retry_cmd 3 "$SEMGREP_VENV/bin/python" -m pip install --quiet --upgrade pip "semgrep==${SEMGREP_VERSION}"
            fi
            ln -sf "$SEMGREP_VENV/bin/semgrep" "$HOME/.local/bin/semgrep"
            export MISE_CARGO_BINSTALL=false
            export MISE_NODE_VERIFY=false
            retry_cmd 3 mise install \
              node pnpm python uv cargo:prek \
              npm:@brainwav/diagram npm:@argos-ci/cli cosign cloudflared npm:vitest \
              ruff npm:eslint npm:agent-browser npm:agentation npm:agentation-mcp \
              npm:ctx7 npm:@mermaid-js/mermaid-cli npm:@brainwav/rsearch npm:@brainwav/wsearch-cli \
              npm:beautiful-mermaid npm:markdownlint-cli2 npm:semver npm:wrangler \
              trivy vale
            semgrep --version
            bash scripts/check-environment.sh
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: docs-gate
          check_name: docs-gate
          command: bash scripts/run-harness-gate.sh docs-gate --mode required --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: lint
          check_name: lint
          command: pnpm lint
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: typecheck
          check_name: typecheck
          command: pnpm typecheck
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: test
          check_name: test
          command: pnpm test:ci
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: smarter-testing-comparison
          check_name: smarter-testing-comparison
          command: bash scripts/compare-circleci-smarter-testing.sh
          requires:
            - test
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: audit
          check_name: audit
          command: pnpm audit
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: check
          check_name: check
          command: pnpm check
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: memory
          check_name: memory
          command: bash scripts/run-harness-gate.sh memory-gate --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: consistency-drift-health
          check_name: consistency-drift-health
          command: bash scripts/run-harness-gate.sh drift-gate --mode health --json
          filters:
            tags:
              ignore: /.*/

  security-scan:
    jobs:
      - run-governance-check:
          name: security-scan
          check_name: security-scan
          skip_dependency_bootstrap: true
          command: bash scripts/check-semgrep-full.sh
          filters:
            tags:
              ignore: /.*/
      - snyk-dependency-scan:
          name: snyk-dependency-scan
          filters:
            tags:
              ignore: /.*/
