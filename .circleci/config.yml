version: 2.1

# ---------------------------------------------------------------------------
# Reusable commands
# ---------------------------------------------------------------------------
commands:
  setup-pnpm:
    description: Ensure pnpm is available, configure auth, and install dependencies (with cache)
    steps:
      - run:
          name: Ensure pnpm available
          command: |
            if ! command -v pnpm > /dev/null 2>&1; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              npm install --global pnpm@10.0.0
            fi
            pnpm --version
      - run:
          name: Configure gh CLI token
          command: |
            # CircleCI doesn't inject GITHUB_TOKEN automatically like GitHub Actions.
            # Map our PAT → GH_TOKEN so the gh CLI and git push authenticate correctly.
            echo "export GH_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}" >> "$BASH_ENV"
            git config --global url."https://${GITHUB_PERSONAL_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
            - node_modules

  skip-if-bot:
    description: Halt gracefully when the triggering commit was pushed by circleci[bot]
    steps:
      - run:
          name: Skip bot-triggered runs
          command: |
            COMMITTER="$(git log -1 --format=%cn)"
            if [ "$COMMITTER" = "circleci[bot]" ]; then
              echo "Skipping — triggered by circleci[bot] commit."
              circleci step halt
            fi

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # === PR quality gates (lint, typecheck, test, audit) ===
  pr-pipeline:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Docs and Workflow Contracts
          command: |
            pnpm docs:lint
            pnpm workflow:validate
      - run:
          name: Lint
          command: pnpm lint
      - run:
          name: Typecheck
          command: pnpm typecheck
      - run:
          name: Test
          command: pnpm test:ci
      - run:
          name: Audit
          command: pnpm audit
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  # === Linear issue sync from PR metadata ===
  linear-sync:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Sync Linear PR State
          command: pnpm exec tsx scripts/circleci-linear-sync.ts

  # === Security scanning (gitleaks + semgrep) ===
  security-scan:
    docker:
      - image: cimg/python:3.12-node
    steps:
      - checkout
      - run:
          name: Install gitleaks
          command: |
            GITLEAKS_VERSION="8.21.2"
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar xz -C /tmp
            sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
            gitleaks version
      - run:
          name: Gitleaks Scan
          command: gitleaks detect --source . --verbose
      - run:
          name: Semgrep Scan
          command: |
            pip install --quiet semgrep
            semgrep scan \
              --config p/security-audit \
              --error \
              --severity ERROR \
              --exclude node_modules \
              --exclude dist \
              .

  # === Diagram refresh (main only, commits back) ===
  diagram-refresh:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - skip-if-bot
      - setup-pnpm
      - run:
          name: Generate diagrams
          command: pnpm exec diagram all . --output-dir AI/diagrams
      - run:
          name: Generate context file
          command: |
            mkdir -p AI/context
            echo "# Diagram Context Pack" > AI/context/diagram-context.md
            echo "" >> AI/context/diagram-context.md
            echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> AI/context/diagram-context.md
            echo "" >> AI/context/diagram-context.md
            for file in AI/diagrams/*.mmd; do
              name="$(basename "$file" .mmd)"
              {
                echo "## ${name}"
                echo ""
                echo '```mermaid'
                cat "$file"
                echo ""
                echo '```'
                echo ""
              } >> AI/context/diagram-context.md
            done
      - run:
          name: Commit diagram updates
          command: |
            git config user.name "circleci[bot]"
            git config user.email "circleci[bot]@users.noreply.github.com"
            if git diff --quiet; then
              echo "No diagram changes to commit"
              exit 0
            fi
            git add AI/diagrams AI/context/diagram-context.md
            git commit -m "chore(diagrams): auto-refresh architecture diagrams"
            git push

  # === Branch cleanup (delete stale merged branches) ===
  branch-cleanup:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - skip-if-bot
      - run:
          name: Delete stale merged branches
          command: |
            git fetch --prune
            for branch in $(git branch -r --merged origin/main | grep -vE 'main|master|HEAD' | sed 's|origin/||'); do
              last_commit=$(git log -1 --format=%ci "origin/$branch" 2>/dev/null || echo "")
              if [ -n "$last_commit" ]; then
                age_days=$(( ( $(date +%s) - $(date -d "$last_commit" +%s) ) / 86400 ))
                if [ "$age_days" -gt 30 ]; then
                  echo "Deleting stale branch: $branch (last commit: $last_commit)"
                  git push origin --delete "$branch" || true
                fi
              fi
            done

  # === Auto release: prepare release PR or tag merged release ===
  auto-release:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - skip-if-bot
      - run:
          name: Configure git
          command: |
            git fetch --tags --force
            git config user.name "circleci[bot]"
            git config user.email "circleci[bot]@users.noreply.github.com"
      - setup-pnpm
      - run:
          name: Build
          command: pnpm build
      - run:
          name: Run post-merge review gate
          command: |
            set -euo pipefail
            # Resolve merged PR from commit message
            COMMIT_MSG="$(git log -1 --format=%s)"
            PR_NUM="$(echo "$COMMIT_MSG" | grep -oP '\(#\K\d+' || true)"

            if [ -z "$PR_NUM" ]; then
              echo "No PR number in commit message, skipping review gate."
              exit 0
            fi

            PR_SHA="$(gh pr view "$PR_NUM" --json headRefOid --jq .headRefOid 2>/dev/null || true)"
            if [ -z "$PR_SHA" ]; then
              echo "Could not resolve PR head SHA, skipping review gate."
              exit 0
            fi

            node dist/cli.js review-gate \
              --token "$GITHUB_PERSONAL_ACCESS_TOKEN" \
              --owner "$CIRCLE_PROJECT_USERNAME" \
              --repo "$CIRCLE_PROJECT_REPONAME" \
              --pr "$PR_NUM" \
              --sha "$PR_SHA" \
              --check "Greptile Review" \
              --contract "harness.contract.json" \
              --bot-login "greptile-apps" \
              --auto-resolve-bot-threads \
              --json || true
      - run:
          name: Prepare or tag release
          command: |
            set -euo pipefail
            COMMIT_MSG="$(git log -1 --format=%s)"

            # If this is a release commit that was just merged, tag it
            RELEASE_VERSION="$(echo "$COMMIT_MSG" | grep -oP '^chore\(release\): v\K[0-9]+\.[0-9]+\.[0-9]+' || true)"
            if [ -n "$RELEASE_VERSION" ]; then
              PKG_VERSION="$(node -p "require('./package.json').version")"
              if [ "$PKG_VERSION" != "$RELEASE_VERSION" ]; then
                echo "Release commit version v$RELEASE_VERSION does not match package.json v$PKG_VERSION"
                exit 1
              fi
              TAG_NAME="v${RELEASE_VERSION}"
              if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q .; then
                echo "Tag $TAG_NAME already exists; skipping."
                exit 0
              fi
              git tag "$TAG_NAME" "$CIRCLE_SHA1"
              git push origin "refs/tags/$TAG_NAME"
              echo "Tagged and pushed $TAG_NAME"
              exit 0
            fi

            # Otherwise, validate and prepare a release PR
            pnpm lint
            pnpm docs:lint
            pnpm workflow:validate
            pnpm typecheck
            pnpm test:ci
            pnpm audit
            pnpm exec standard-version --skip.commit --skip.tag

            if git diff --quiet -- package.json CHANGELOG.md; then
              echo "No release changes detected; skipping PR creation."
              exit 0
            fi

            VERSION="$(node -p "require('./package.json').version")"
            BRANCH="codex/release-v${VERSION}"

            git checkout -B "$BRANCH"
            git add package.json CHANGELOG.md
            git commit -m "chore(release): v${VERSION}"
            git push --force-with-lease origin "$BRANCH"

            EXISTING_PR="$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty' || true)"

            if [ -n "$EXISTING_PR" ]; then
              gh pr edit "$EXISTING_PR" --title "chore(release): v${VERSION}"
              echo "Updated existing release PR #$EXISTING_PR for v${VERSION}."
            else
              gh pr create --base main --head "$BRANCH" --title "chore(release): v${VERSION}" --body "Automated release PR for v${VERSION}."
            fi

  # === Publish to private npm (triggered by tag) ===
  publish-npm:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Validate release candidate
          command: |
            pnpm lint
            pnpm docs:lint
            pnpm workflow:validate
            pnpm typecheck
            pnpm test:ci
            pnpm audit
      - run:
          name: Build
          command: pnpm build
      - run:
          name: Smoke test packed CLI artifact
          command: |
            set -euo pipefail
            TARBALL="$(npm pack --silent)"
            TMP_DIR="$(mktemp -d)"
            npm init -y --prefix "$TMP_DIR" > /dev/null 2>&1
            npm install --prefix "$TMP_DIR" "./$TARBALL" > /dev/null
            "$TMP_DIR/node_modules/.bin/harness" --version
            node "$TMP_DIR/node_modules/@brainwav/coding-harness/dist/cli.js" --version
      - run:
          name: Verify tag matches package version
          command: |
            PKG_VERSION="$(node -p "require('./package.json').version")"
            TAG_VERSION="${CIRCLE_TAG#v}"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "Tag v$TAG_VERSION does not match package.json version v$PKG_VERSION"
              exit 1
            fi
      - run:
          name: Generate SBOM
          command: |
            npm install -g @cyclonedx/cyclonedx-npm --silent
            cyclonedx-npm --output-format JSON --output-file sbom.json . || true
      - run:
          name: Publish to npm
          command: |
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            pnpm publish --no-git-checks --access restricted
      - run:
          name: Create GitHub Release with SBOM
          command: |
            VERSION="$(node -p "require('./package.json').version")"
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file CHANGELOG.md \
              --latest \
              sbom.json#sbom || echo "Release already exists"
      - store_artifacts:
          path: sbom.json
          destination: sbom

  # === E2E tests (scheduled) ===
  e2e-tests:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Build
          command: pnpm build
      - run:
          name: Run E2E Tests
          no_output_timeout: 60m
          command: pnpm e2e:ci
      - store_artifacts:
          path: e2e/recordings
          destination: e2e-recordings
      - store_artifacts:
          path: e2e/reports
          destination: e2e-reports

  # === Gardener (docs maintenance) ===
  gardener:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Build
          command: pnpm build
      - run:
          name: Run gardener analysis
          command: node dist/cli.js gardener --json --dry-run > gardener-report.json || true
      - run:
          name: Create maintenance PR if needed
          command: |
            if [ ! -f gardener-report.json ]; then
              echo "No gardener report; skipping."
              exit 0
            fi

            NEEDS_PR="$(jq -r '.needsPR' gardener-report.json)"
            if [ "$NEEDS_PR" != "true" ]; then
              echo "No maintenance needed."
              exit 0
            fi

            BRANCH_NAME="gardener/$(date +%Y-%m-%d-%H%M%S)"
            git config user.name "circleci[bot]"
            git config user.email "circleci[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH_NAME"
            node dist/cli.js gardener --json || true
            git add docs/QUALITY_SCORE.md
            if git diff --cached --quiet; then
              echo "No gardener changes to commit."
              exit 0
            fi
            git commit -m "docs: gardening updates ($(date +%Y-%m-%d))"
            git push -u origin "$BRANCH_NAME"
            gh pr create --title "docs: gardening updates" --body "Automated gardening updates from harness gardener workflow" || echo "PR creation not permitted"
      - store_artifacts:
          path: gardener-report.json
          destination: gardener-report

  # === Stale issue/PR management ===
  stale-management:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Run stale management
          command: pnpm exec tsx scripts/circleci-stale-management.ts

  # === Automation dispatch (on-demand via CircleCI API only) ===
  automation:
    docker:
      - image: cimg/node:24.13
    parameters:
      automation-name:
        type: string
        default: "drift-check"
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Run automation
          command: |
            mkdir -p artifacts/automation
            INPUT_FINGERPRINT="$(printf "%s" "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}:${CIRCLE_SHA1}:<< parameters.automation-name >>" | sha256sum | awk '{print $1}')"
            pnpm exec tsx src/cli.ts automation-run \
              --name "<< parameters.automation-name >>" \
              --repo "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}" \
              --head-sha "${CIRCLE_SHA1}" \
              --contract-version "1.2.0" \
              --input-fingerprint "${INPUT_FINGERPRINT}" \
              --artifacts-dir artifacts/automation \
              --json
      - store_artifacts:
          path: artifacts/automation
          destination: automation-artifacts

# ---------------------------------------------------------------------------
# Workflows
# ---------------------------------------------------------------------------
workflows:
  # Runs on PR branches only (not main — main is covered by post-merge)
  pr-checks:
    jobs:
      - pr-pipeline:
          filters:
            branches:
              ignore: main
      - linear-sync:
          filters:
            branches:
              ignore: main
      - security-scan:
          filters:
            branches:
              ignore: main

  # Runs only on main merges (post-merge housekeeping)
  post-merge:
    jobs:
      - diagram-refresh:
          filters:
            branches:
              only: main
      - branch-cleanup:
          filters:
            branches:
              only: main
      - auto-release:
          filters:
            branches:
              only: main

  # Runs on version tags (publish to npm)
  publish:
    jobs:
      - publish-npm:
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+.*/
            branches:
              ignore: /.*/

  # Scheduled: daily at 1:30 UTC
  nightly:
    triggers:
      - schedule:
          cron: "30 1 * * *"
          filters:
            branches:
              only: main
    jobs:
      - stale-management
      - gardener

  # Scheduled: every 6 hours
  periodic:
    triggers:
      - schedule:
          cron: "0 0,6,12,18 * * *"
          filters:
            branches:
              only: main
    jobs:
      - e2e-tests
