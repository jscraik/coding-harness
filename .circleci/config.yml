version: 2.1

jobs:
  pr-pipeline:
    docker:
      - image: cimg/node:24.13
    steps:
      - checkout
      - run:
          name: Enable corepack
          command: corepack enable
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Lint
          command: pnpm lint
      - run:
          name: Typecheck
          command: pnpm typecheck
      - run:
          name: Test
          command: pnpm test
      - run:
          name: Audit
          command: pnpm audit
      - run:
          name: Policy Bundle
          command: pnpm check

workflows:
  pr-pipeline:
    jobs:
      - pr-pipeline
