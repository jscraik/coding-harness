version: 2.1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # PR pipeline (fast) — lint, typecheck, audit, and the full test suite
  # excluding the slow pilot-evaluate suite.
  #
  # resource_class: large (4 vCPU / 8 GB) — required because ci-migrate.test.ts
  # runs 97 RSA-signing tests (~233s). On medium (2 vCPU) the vitest birpc IPC
  # onTaskUpdate call stalls past the 60s timeout under CPU contention.
  # ─────────────────────────────────────────────────────────────────────────────
  pr-fast:
    docker:
      - image: cimg/node:24.13
    resource_class: large
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            sudo corepack enable
            corepack prepare pnpm@10.0.0 --activate
            pnpm --version
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Lint
          command: pnpm lint
      - run:
          name: Typecheck
          command: pnpm typecheck
      - run:
          name: Test (excluding pilot-evaluate)
          no_output_timeout: 12m
          # Excludes the slow pilot-evaluate suite; it runs in pr-slow.
          # ci-migrate.test.ts alone runs ~233s of RSA signing and needs the
          # isolated worker-timeout mitigation from scripts/test-ci.sh.
          command: |
            pnpm exec vitest run --maxWorkers=1 --exclude '**/pilot-evaluate.test.ts' --exclude src/commands/ci-migrate.test.ts
            pnpm exec vitest run --maxWorkers=1 --dangerouslyIgnoreUnhandledErrors src/commands/ci-migrate.test.ts
      - run:
          name: Audit
          command: pnpm audit
      - run:
          name: Docs lint
          command: pnpm docs:lint
      - run:
          name: Skill + workflow validation
          command: pnpm skill:validate && pnpm workflow:validate

  # ─────────────────────────────────────────────────────────────────────────────
  # PR pipeline (slow) — isolated pilot-evaluate suite.
  #
  # pilot-evaluate.test.ts runs long-running evaluation windows and RSA signing
  # loops. On large (4 vCPU) the vitest worker IPC can time out when run
  # alongside other heavy suites. Isolated here on xlarge with its own timeout.
  # ─────────────────────────────────────────────────────────────────────────────
  pr-slow:
    docker:
      - image: cimg/node:24.13
    resource_class: large
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            sudo corepack enable
            corepack prepare pnpm@10.0.0 --activate
            pnpm --version
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Test (pilot-evaluate only)
          no_output_timeout: 20m
          command: pnpm exec vitest run src/commands/pilot-evaluate.test.ts

  # Canonical PR status aggregator — preserves the historical CircleCI
  # `pr-pipeline` status context that branch protection and harness metadata
  # expect, while still letting the fast/slow jobs run independently.
  pr-pipeline:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
          name: Aggregate PR pipeline status
          command: echo "pr-fast and pr-slow completed successfully"

  # ─────────────────────────────────────────────────────────────────────────────
  # Release pipeline — runs on main branch merges only
  #
  # Required CircleCI environment variables (set in Project Settings → Env Vars):
  #   NPM_TOKEN                    — npm access token with publish rights to @brainwav scope
  #   GITHUB_PERSONAL_ACCESS_TOKEN — GitHub PAT with contents:write + workflow scopes
  #                                  (used to push the version commit + tag back to main)
  #
  # Flow:
  #   1. Validate secrets present
  #   2. Run full pnpm check suite
  #   3. standard-version bumps package.json + CHANGELOG.md, commits, tags
  #   4. Push the commit + tag to main via authenticated remote
  #   5. Build and publish to npm
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    docker:
      - image: cimg/node:24.13
    resource_class: large
    steps:
      - checkout
      - run:
          name: Ensure pnpm available
          command: |
            sudo corepack enable
            corepack prepare pnpm@10.0.0 --activate
            pnpm --version
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Validate release secrets
          command: |
            missing=()
            [ -z "$NPM_TOKEN" ]                    && missing+=("NPM_TOKEN")
            [ -z "$GITHUB_PERSONAL_ACCESS_TOKEN" ] && missing+=("GITHUB_PERSONAL_ACCESS_TOKEN")
            if [ ${#missing[@]} -gt 0 ]; then
              echo "ERROR: Missing required environment variables: ${missing[*]}"
              echo "Configure them in CircleCI Project Settings -> Environment Variables."
              echo "  NPM_TOKEN                    - npm token with publish rights to @brainwav scope"
              echo "  GITHUB_PERSONAL_ACCESS_TOKEN - GitHub PAT with contents:write + workflow scopes"
              exit 1
            fi
            echo "Release secrets validated"
      - run:
          name: Full check suite
          no_output_timeout: 15m
          command: pnpm check
      - run:
          name: Configure git for release commit
          command: |
            git config user.name "CircleCI Release Bot"
            git config user.email "ci@brainwav.io"
            git remote set-url origin "https://${GITHUB_PERSONAL_ACCESS_TOKEN}@github.com/jscraik/coding-harness.git"
      - run:
          name: Bump version and generate changelog
          command: |
            pnpm release --no-verify
            echo "Bumped to $(jq -r '.version' package.json)"
      - run:
          name: Push release commit and tag to main
          command: |
            VERSION="v$(jq -r '.version' package.json)"
            git push origin main --follow-tags
            echo "Pushed ${VERSION} to main"
      - run:
          name: Build package
          command: pnpm build
      - run:
          name: Publish to npm
          command: |
            VERSION="$(jq -r '.version' package.json)"
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            npm publish --access restricted --ignore-scripts=false
            echo "Published @brainwav/coding-harness@${VERSION}"

workflows:
  # Runs on every PR branch push (all branches except main).
  # pr-fast and pr-slow run in parallel, then the no-op pr-pipeline aggregator
  # publishes the canonical PR status context used by branch protection.
  pr-workflow:
    jobs:
      - pr-fast:
          filters:
            branches:
              ignore: main
      - pr-slow:
          filters:
            branches:
              ignore: main
      - pr-pipeline:
          requires:
            - pr-fast
            - pr-slow
          filters:
            branches:
              ignore: main

  # Runs only on main after PR merges
  release-workflow:
    jobs:
      - release:
          filters:
            branches:
              only: main
