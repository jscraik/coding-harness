version: 2.1

jobs:
  run-governance-check:
    docker:
      # Pinned to specific minor for reproducibility (JSC-115)
      - image: cimg/node:24.13
    resource_class: small
    parameters:
      check_name:
        type: string
      command:
        type: string
    steps:
      - checkout
      - run:
          name: Verify GH token wiring
          command: |
            if [ -n "${GH_TOKEN:-${GITHUB_PERSONAL_ACCESS_TOKEN:-}}" ]; then
              echo "GitHub token is available for gh-backed steps."
            else
              echo "GH_TOKEN/GITHUB_PERSONAL_ACCESS_TOKEN not set; gh-backed steps may fail."
            fi
      - run:
          name: Ensure baseline shell tools
          command: |
            packages=()
            if ! command -v gh >/dev/null 2>&1; then
              packages+=("gh")
            fi
            if ! command -v rg >/dev/null 2>&1; then
              packages+=("ripgrep")
            fi
            if ! command -v fd >/dev/null 2>&1 && ! command -v fdfind >/dev/null 2>&1; then
              packages+=("fd-find")
            fi
            if ! command -v jq >/dev/null 2>&1; then
              packages+=("jq")
            fi
            if ! command -v make >/dev/null 2>&1; then
              packages+=("make")
            fi
            if ! command -v realpath >/dev/null 2>&1; then
              packages+=("coreutils")
            fi
            if (( ${#packages[@]} > 0 )); then
              sudo apt-get update
              sudo apt-get install -y "${packages[@]}"
            fi
            gh --version
            if ! command -v fd >/dev/null 2>&1 && command -v fdfind >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              ln -sf "$(command -v fdfind)" "$HOME/.local/bin/fd"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              export PATH="$HOME/.local/bin:$PATH"
            fi
            rg --version
            fd --version
            jq --version
            make --version
            realpath --version
      - run:
          name: Ensure mise available
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            if ! command -v mise >/dev/null 2>&1; then
              curl -fsSL https://mise.run | sh
            fi
            mise trust --yes .mise.toml
            mise --version
      - run:
          name: Ensure pnpm available
          command: |
            required_pnpm_version="10.33.0"
            current_pnpm_version=""
            if command -v pnpm >/dev/null 2>&1; then
              current_pnpm_version="$(pnpm --version || true)"
            fi
            if [[ "$current_pnpm_version" != "$required_pnpm_version" ]]; then
              export NPM_CONFIG_PREFIX="$HOME/.local"
              export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"
              echo 'export NPM_CONFIG_PREFIX="$HOME/.local"' >> "$BASH_ENV"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
              npm install --global --prefix "$NPM_CONFIG_PREFIX" "pnpm@${required_pnpm_version}"
            fi
            pnpm --version
      - run:
          name: Configure pnpm store
          command: |
            mkdir -p "$HOME/.pnpm-store"
            pnpm config set store-dir "$HOME/.pnpm-store"
            pnpm store path
      - restore_cache:
          keys:
            - v2-pnpm-store-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - v2-pnpm-store-{{ arch }}-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: v2-pnpm-store-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
      - run:
          name: Ensure test-results directory exists
          when: always
          command: |
            mkdir -p artifacts/test-results
      - run:
          name: << parameters.check_name >>
          command: << parameters.command >>
      - store_test_results:
          path: artifacts/test-results
          when: always
      - store_artifacts:
          path: artifacts/test-results
          when: always

workflows:
  pr-pipeline:
    jobs:
      - run-governance-check:
          name: risk-policy-gate
          check_name: risk-policy-gate
          command: bash scripts/run-harness-gate.sh policy-gate --max-tier medium --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: dependency-scan
          check_name: dependency-scan
          command: pnpm audit:strict
          filters:
            tags:
              ignore: /.*/
	      - run-governance-check:
	          name: orb-pinning
	          check_name: orb-pinning
	          command: |
	            packages=()
	            for pkg in python3 python3-venv python3-pip; do
	              if ! dpkg -s "$pkg" >/dev/null 2>&1; then
	                packages+=("$pkg")
	              fi
	            done
	            if (( ${#packages[@]} > 0 )); then
	              sudo apt-get update
	              sudo apt-get install -y "${packages[@]}"
	            fi
	            mkdir -p "$HOME/.local/bin" "$HOME/.local/share"
            export PATH="$HOME/.local/bin:$PATH"
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            if ! command -v cargo >/dev/null 2>&1; then
              mise install rust@stable
	              if [[ -f "$HOME/.cargo/env" ]]; then
	                # rustup does not update the current shell PATH for non-interactive jobs.
	                . "$HOME/.cargo/env"
	              fi
	            fi
	            # Reuse the shared Semgrep bootstrap so orb-pinning and security-scan resolve the same runtime path.
	            # shellcheck source=scripts/semgrep-bootstrap.sh
	            source "$PWD/scripts/semgrep-bootstrap.sh"
	            ensure_semgrep_version
	            export MISE_CARGO_BINSTALL=false
	            export MISE_NODE_VERIFY=false
	            mise install \
	              node pnpm python uv cargo:prek \
	              npm:@brainwav/diagram npm:@argos-ci/cli cosign cloudflared npm:vitest \
              ruff npm:eslint npm:agent-browser npm:agentation npm:agentation-mcp \
	              npm:@mermaid-js/mermaid-cli npm:@brainwav/rsearch npm:@brainwav/wsearch-cli \
	              npm:beautiful-mermaid npm:markdownlint-cli2 npm:semver npm:wrangler \
	              trivy vale
	            run_semgrep --version
	            bash scripts/check-environment.sh
	          filters:
	            tags:
	              ignore: /.*/
      - run-governance-check:
          name: docs-gate
          check_name: docs-gate
          command: bash scripts/run-harness-gate.sh docs-gate --mode required --json
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: lint
          check_name: lint
          command: pnpm lint
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: typecheck
          check_name: typecheck
          command: pnpm typecheck
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: test
          check_name: test
          command: pnpm test:ci
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: audit
          check_name: audit
          command: pnpm audit
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: check
          check_name: check
          command: pnpm check
          filters:
            tags:
              ignore: /.*/
      - run-governance-check:
          name: memory
          check_name: memory
          command: test -f memory.json && jq -e '.meta.version == "1.0" and (.preamble.bootstrap | type == "boolean") and (.preamble.search | type == "boolean") and (.entries | type == "array")' memory.json >/dev/null
          filters:
            tags:
              ignore: /.*/

  security-scan:
    jobs:
      - run-governance-check:
          name: security-scan
          check_name: security-scan
          command: bash scripts/check-semgrep-changed.sh --all
          filters:
            tags:
              ignore: /.*/
