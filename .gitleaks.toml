title = "Coding Harness gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Fixture-safe allowlist for docs/spec/tests/examples used in test data."
paths = [
  # General fixture/example directories
  "(^|/)docs?/", 
  "(^|/)examples?/", 
  "(^|/)test/", 
  "(^|/)tests?/", 
  "(^|/)spec/", 
  "(^|/)specs?/", 
  "(^|/)__tests__/", 
  "(^|/)test-data/", 

  # Suffix-based fixture files in any directory
  "(^|/)[^.]+\\.(test|spec)\\.[^.]+$", 
]

# Redacted fixture tokens used in test assertions are expected.
# Do not broaden this list for production credential-like strings.
regexes = [
  "\\[REDACTED\\]",
]
