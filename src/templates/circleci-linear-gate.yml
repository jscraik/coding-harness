      - run-governance-check:
          name: linear-gate
          check_name: linear-gate
          requires:
            - pr-template
          command: |
            export GH_BIN="${HARNESS_GH_BIN:-${GH_BIN:-gh}}"
            pr_ref="$(HARNESS_CIRCLECI_PR_REF_CHECK_NAME=linear-gate GH_BIN="$GH_BIN" bash scripts/resolve-circleci-pr-ref.sh)"
            pr_metadata="$(GH_BIN="$GH_BIN" bash scripts/read-circleci-pr-metadata.sh "$pr_ref")"
            branch_name="$(printf '%s\n' "$pr_metadata" | jq -r '.headRefName // ""')"
            pr_title="$(printf '%s\n' "$pr_metadata" | jq -r '.title // ""')"
            pr_body="$(printf '%s\n' "$pr_metadata" | jq -r '.body // ""')"
            bash scripts/run-harness-gate.sh linear-gate \
              --branch "$branch_name" \
              --pr-title "$pr_title" \
              --pr-body "$pr_body" \
              --json
          filters:
            tags:
              ignore: /.*/
