      - run-governance-check:
          name: linear-gate
          check_name: linear-gate
          requires:
            - pr-template
          command: |
            pr_ref="${CIRCLE_PULL_REQUEST:-}"
            repo_slug=""
            if [[ -n "${CIRCLE_PROJECT_USERNAME:-}" && -n "${CIRCLE_PROJECT_REPONAME:-}" ]]; then
              repo_slug="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
            fi
            gh_repo_args=()
            if [[ -n "$repo_slug" ]]; then
              gh_repo_args=(--repo "$repo_slug")
            fi
            if [[ -z "$pr_ref" && -n "${CIRCLE_PULL_REQUESTS:-}" ]]; then
              pr_ref="${CIRCLE_PULL_REQUESTS%%,*}"
            fi
            if [[ -z "$pr_ref" && -n "${CIRCLE_BRANCH:-}" ]]; then
              if [[ -n "${CIRCLE_PROJECT_USERNAME:-}" ]]; then
                pr_ref="$(gh pr list "${gh_repo_args[@]}" --head "${CIRCLE_PROJECT_USERNAME}:${CIRCLE_BRANCH}" --state open --json url --jq '.[0].url // ""' 2>/dev/null || true)"
              fi
            fi
            if [[ -z "$pr_ref" && -n "${CIRCLE_BRANCH:-}" ]]; then
              pr_ref="$(gh pr list "${gh_repo_args[@]}" --head "$CIRCLE_BRANCH" --state open --json url --jq '.[0].url // ""' 2>/dev/null || true)"
            fi
            if [[ -z "$pr_ref" && -n "${CIRCLE_SHA1:-}" && -n "$repo_slug" ]]; then
              pr_ref="$(gh api -H "Accept: application/vnd.github+json" "/repos/${repo_slug}/commits/${CIRCLE_SHA1}/pulls" --jq '([.[] | select(.state == "open")][0].html_url // .[0].html_url // "")' 2>/dev/null || true)"
            fi
            if [[ -z "$pr_ref" ]]; then
              echo "Error: unable to resolve pull request context for linear-gate."
              exit 1
            fi
            branch_name="$(gh pr view "${gh_repo_args[@]}" "$pr_ref" --json headRefName --jq .headRefName)"
            pr_title="$(gh pr view "${gh_repo_args[@]}" "$pr_ref" --json title --jq .title)"
            pr_body="$(gh pr view "${gh_repo_args[@]}" "$pr_ref" --json body --jq .body)"
            bash scripts/run-harness-gate.sh linear-gate \
              --branch "$branch_name" \
              --pr-title "$pr_title" \
              --pr-body "$pr_body" \
              --json
          filters:
            tags:
              ignore: /.*/
