name: Harness PR Pipeline

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-template:
    name: pr-template
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template completion
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? '';
            const errors = [];
            const localAbsolutePathPattern = /(?:^|[\s\x60"'(])((?:\/Users\/|\/private\/var\/folders\/|\/var\/folders\/|\/private\/tmp\/|\/tmp\/)[^\s\x60"'<>),;]+)/g;

            if (body.trim().length === 0) {
              errors.push('PR body is empty. Fill out the full PR template.');
            }

            const requiredSections = [
              '## Summary',
              '## Work performed',
              '## Checklist',
              '## Testing',
              '## Review artifacts',
              '## Notes',
            ];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push('Missing required section: ' + section);
              }
            }

            const extractSectionBody = (heading) => {
              const escapedHeading = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = body.match(new RegExp(`(?:^|\\n)${escapedHeading}[ \\t]*(?:\\r?\\n)([\\s\\S]*?)(?=\\r?\\n## |\\r?\\n# |$)`, 'i'));
              return match ? (match[1] ?? '') : null;
            };
            const normalizeFieldValue = (value) => {
              let normalized = value.trim();
              const fencedMatch = normalized.match(/^```[\\w-]*\\s*([\\s\\S]*?)\\s*```$/);
              if (fencedMatch) {
                normalized = fencedMatch[1] ?? '';
              }
              const inlineCodeMatch = normalized.match(/^`([^`]+)`$/);
              if (inlineCodeMatch) {
                normalized = inlineCodeMatch[1] ?? '';
              }
              return normalized.replace(/\\s+/g, ' ').trim();
            };

            const workPerformedBody = extractSectionBody('## Work performed');
            if (!workPerformedBody) {
              errors.push('Missing work performed block.');
            } else {
              const requiredWorkFields = [
                { label: 'Plan IDs', placeholder: 'list Linear keys, spec paths, plan paths, or `n.a.` with reason' },
                { label: 'Phase / slice', placeholder: 'list completed phase, implementation slice, or `n.a.` with reason' },
                { label: 'Session IDs', placeholder: 'list Codex thread/session IDs, session-collector artifact IDs or paths, harness run IDs, or `n.a.` with reason. For AI-assisted work, include at least one session reference or explain why no session artifact was captured.' },
                { label: 'Trace IDs', placeholder: 'list CI workflow/job URLs, harness/eval/runtime trace IDs, runtime-card/evidence bundle artifact paths, review trace IDs, or `n.a.` with reason. For traced or evaluated work, include the trace or artifact reference used to verify the claim.' },
                { label: 'AI session / traceability', placeholder: 'map the AI session or trace reference to the work it supports; do not paste raw transcripts, prompts, secrets, or bulky telemetry into the PR body.' },
                { label: 'Completed work', placeholder: 'list implementation units, docs/config changes, or evidence-only work completed in this PR' },
                { label: 'Affected surfaces', placeholder: 'list code, tests, docs, PR template, CLI reference, workflow config, generated artifacts, examples, or `n.a.` with reason' },
                { label: 'Expected outcome alignment', placeholder: 'state how this change preserves Coding Harness as a portable agent operating system for greenfield and brownfield repos, or mark `n.a.` with reason' },
                { label: 'Pattern scope inventory', placeholder: 'for any steering feedback, review comment, or line-level correction that implies a broader design/API principle, name the principle, list sibling implementations or similar misbehavior classes searched, and state which siblings were changed, intentionally left unchanged, or deferred with tracker/evidence' },
                { label: 'Meta-behavior proof', placeholder: 'for repeated steering or high-signal corrections, name the durable repo/system change plus concrete repo path, command, or issue ID that prevents recurrence, or `n.a.` with tracked exception reason' },
                { label: 'Repeated-error research', placeholder: 'when the same error occurs twice, use `Source: ...; Candidate 1: ...; Candidate 2: ...; Candidate 3: ...; Chosen: ...; Implemented: ...`; otherwise `n.a.` with reason' },
                { label: 'Acceptance trace', placeholder: 'map completed acceptance items to evidence refs, or `n.a.` with reason' },
                { label: 'Validation evidence', placeholder: 'list command outcomes, CI jobs, repo-relative artifact paths, or `n.a.` with reason; do not paste local absolute paths' },
                { label: 'Review artifacts', placeholder: 'list CodeRabbit, Codex, reviewer, or harness review artifacts, or `n.a.` with reason' },
                { label: 'Durable evidence map', placeholder: 'classify every local-only artifact reference as tracked receipt, PR comment, CI artifact URL, runtime-card/evidence-bundle ref, or `n.a.` with reason; use repo-relative paths only' },
                { label: 'Runtime impact', placeholder: 'state direct, transitive, dev-only, CI-only, runtime-facing, or `n.a.` with reason' },
                { label: 'CodeRabbit mode coverage', placeholder: 'list analysis, validation, gate, closeout, promotion, or `n.a.` with reason' },
                { label: 'Closeout state', placeholder: 'classify PR state, merge or auto-merge state, branch/worktree state, Linear state, next-lane routing, and any remaining blocker or waiting owner' },
                { label: 'Learning / reinforcement', placeholder: 'list promoted learnings, memory updates, or `none` with reason' },
                { label: 'Deferred work', placeholder: 'list follow-up work intentionally left out, or `none`' },
              ];
              const workFieldValues = new Map();
              for (const field of requiredWorkFields) {
                const escapedLabel = field.label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const match = workPerformedBody.match(
                  new RegExp(
                    `^-\\s*${escapedLabel}:\\s*([\\s\\S]*?)(?=\\n-\\s*[A-Za-z][^:\\n]*:\\s*|$)`,
                    'im',
                  ),
                );
                if (!match) {
                  errors.push('Missing required work performed field: ' + field.label);
                  continue;
                }
                const value = normalizeFieldValue(match[1] ?? '');
                workFieldValues.set(field.label, value);
                const placeholder = normalizeFieldValue(field.placeholder);
                if (value.length === 0 || value === placeholder) {
                  errors.push('Replace work performed field placeholder: ' + field.label);
                }
              }
              const normaliseReferenceToken = (token) => token.replace(/[.,;:]+$/g, '').trim();
              const notApplicablePattern = /^(?:n\.?a\.?|n\/a|not applicable|none)(?:\b|\s|[.;:,(])/i;
              const referenceTokenPattern = /(https?:\/\/[^\s)\]>]+|(?:\.\/)?(?:AI|artifacts|codestyle|contracts|docs|fixtures|scripts|src|test|tests|\.github|\.harness)\/[\w./-]+|(?:runtime-card|runtime-card-handoff|runtime-evidence-bundle|receipts|evidence-receipts|sync-receipts)[\w./-]*(?:\.json|\.jsonl)?)/gi;
              const classifyReference = (reference) => {
                const value = normaliseReferenceToken(reference);
                if (value.length === 0) return 'unknown';
                if (notApplicablePattern.test(value)) return 'not_applicable';
                if (/^https?:\/\/github\.com\/[^\s/]+\/[^\s/]+\/pull\/\d+#(?:issuecomment-|discussion_r)\d+$/i.test(value)) return 'github_pr_comment';
                if (/^https?:\/\/github\.com\/[^\s/]+\/[^\s/]+\/(?:actions\/runs|checks)\/\S+$/i.test(value)) return 'github_check_url';
                if (/^https?:\/\/(?:circleci\.com|app\.circleci\.com|[^\s/]*buildkite\.com|[^\s/]*githubusercontent\.com)\/\S+/i.test(value)) return 'ci_artifact_url';
                if (/^https?:\/\/\S+$/i.test(value)) return 'unknown';
                if (/(?:^|\/)(?:runtime-card|runtime-card-handoff|runtime-evidence-bundle)(?:[\w.-]*)(?:\.json|\.jsonl)?$/i.test(value)) return 'runtime_card_ref';
                if (/(?:^|\/)(?:receipts|evidence-receipts|sync-receipts)(?:[\w.-]*)(?:\.json|\.jsonl)$/i.test(value)) return 'evidence_receipt_ref';
                if (/^(?:\.\/)?(?:artifacts\/|\.harness\/(?:artifacts|runs|evidence|media)\/)/i.test(value)) return 'ignored_local_path';
                if (/^(?:\.\/)?(?:AI\/|codestyle\/|contracts\/|docs\/|fixtures\/|scripts\/|src\/|test\/|tests\/|\.github\/|\.harness\/(?:active-artifacts\.md|decisions\/|knowledge\/|linear\/|plan\/|refactors\/|research\/(?:audits|deep)\/|specs\/|memory\/LEARNINGS\.md))/i.test(value)) return 'tracked_repo_path';
                if (/^(?:\.\/)?(?:AI|artifacts|codestyle|contracts|docs|fixtures|scripts|src|test|tests|\.github|\.harness)\/[\w./-]+$/i.test(value)) return 'untracked_local_path';
                return 'unknown';
              };
              const extractReferences = (text) => Array.from(text.matchAll(referenceTokenPattern), (match) => {
                const value = normaliseReferenceToken(match[0] ?? '');
                return { value, durability: classifyReference(value) };
              }).filter((reference) => reference.value.length > 0);
              const isDurable = (reference) => [
                'tracked_repo_path',
                'ci_artifact_url',
                'github_pr_comment',
                'github_check_url',
                'runtime_card_ref',
                'evidence_receipt_ref',
              ].includes(reference.durability);
              const durableMapValue = workFieldValues.get('Durable evidence map') ?? '';
              const evidenceText = requiredWorkFields
                .filter((field) => field.label !== 'Durable evidence map')
                .map((field) => workFieldValues.get(field.label) ?? '')
                .join('\n');
              const evidenceLocalOnlyReferences = Array.from(
                new Set(
                  extractReferences(evidenceText)
                    .filter((reference) => reference.durability === 'ignored_local_path')
                    .map((reference) => reference.value),
                ),
              );
              if ((durableMapValue.length === 0 || notApplicablePattern.test(durableMapValue)) && evidenceLocalOnlyReferences.length > 0) {
                errors.push('Durable evidence map cannot be n.a. when PR evidence fields cite ignored local artifact paths.');
              }
              const pairedLocalReferences = new Set();
              for (const line of durableMapValue.split(/\r?\n/)) {
                const lineReferences = extractReferences(line);
                if (!lineReferences.some((reference) => reference.durability === 'ignored_local_path')) continue;
                if (!lineReferences.some((reference) => isDurable(reference))) continue;
                for (const reference of lineReferences) {
                  if (reference.durability === 'ignored_local_path') {
                    pairedLocalReferences.add(reference.value);
                  }
                }
              }
              for (const localReference of evidenceLocalOnlyReferences) {
                if (durableMapValue.length > 0 && !notApplicablePattern.test(durableMapValue) && !pairedLocalReferences.has(localReference)) {
                  errors.push('Durable evidence map must pair local-only artifact reference ' + localReference + ' with durable evidence on the same map entry.');
                }
              }
            }

            const requiredTestingFields = [
              { label: 'verification_commands' },
              { label: 'verification_outcomes' },
              { label: 'blocked_steps_reason' },
            ];
            const testingBody = extractSectionBody('## Testing');
            if (!testingBody) {
              errors.push('Missing testing block.');
            } else {
              for (const field of requiredTestingFields) {
                const escapedLabel = field.label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const match = testingBody.match(new RegExp('^-\\s*' + escapedLabel + ':\\s*(.+)$', 'im'));
                if (!match) {
                  errors.push('Missing required testing field: ' + field.label);
                } else {
                  const value = normalizeFieldValue(match[1]);
                  const placeholder = normalizeFieldValue('');
                  if (value.length === 0 || value === placeholder) {
                    errors.push('Replace testing field placeholder: ' + field.label);
                  }
                }
              }
            }

            const checklistMatch = body.match(/## Checklist([\s\S]*?)(?:\n## |\n# |$)/i);

            if (!checklistMatch) {
              errors.push('Missing checklist block.');
            } else {
              const checklistBody = checklistMatch[1] ?? '';
              const checklistItems = checklistBody

                .split('\n')
                .map((line) => line.trim())
                .filter((line) => /^- \[[ xX]\]/.test(line));


              if (checklistItems.length === 0) {
                errors.push('Checklist has no checkbox items.');
              }


              const unchecked = checklistItems.filter((line) => /^- \[ \]/.test(line));
              const unresolvedUnchecked = unchecked.filter(
                (line) => !/\*\*\((pending|n\/a|not applicable)\)\*\*/i.test(line),
              );
              if (unresolvedUnchecked.length > 0) {
                errors.push(
                  'Checklist has unchecked item(s) without explicit status marker ((Pending) or (N/A)):\n' +
                    unresolvedUnchecked.join('\n'),

                );
              }
            }

            const placeholders = [
              'pass/fail',
              '<link / artifact path / comment ID>',
              '<0-5>',
              '<reviewer + link>',
              'Add one-paragraph merge rationale here.',
            ];
            for (const placeholder of placeholders) {
              if (body.includes(placeholder)) {
                errors.push('Replace template placeholder: ' + placeholder);
              }
            }
            const localAbsolutePaths = Array.from(
              new Set(
                Array.from(body.matchAll(localAbsolutePathPattern), (match) =>
                  (match[1] ?? '').replace(/[.,;:]+$/g, ''),
                ).filter((path) => path.length > 0),
              ),
            );
            for (const path of localAbsolutePaths) {
              errors.push('Replace local absolute path in PR body with a repo-relative path, PR comment, CI artifact URL, runtime-card ref, or tracked receipt: ' + path);
            }


            const reviewArtifactsMatch = body.match(/## Review artifacts([\s\S]*?)(?:\n## |\n# |$)/i);
            if (reviewArtifactsMatch) {
              const reviewArtifactsBody = reviewArtifactsMatch[1] ?? '';
              const unresolvedTokens = reviewArtifactsBody.match(/<[^>\n]+>/g) ?? [];

              for (const token of unresolvedTokens) {
                errors.push('Replace unresolved placeholder token: ' + token);
              }
            }

            if (errors.length > 0) {

              core.setFailed(errors.join('\n'));

            }
      - name: Skip PR template enforcement for merge queue
        if: github.event_name == 'merge_group'
        run: echo "merge_group event detected; PR template enforcement is pull_request-only."
{{linearGateJob}}

  risk-policy-gate:
    name: risk-policy-gate
    runs-on: ubuntu-latest
    needs: {{riskPolicyNeeds}}
    if: {{riskPolicyIf}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
{{pnpmSetupStep}}
      - name: Install dependencies
        run: {{installCommand}}
      - name: Run fast preflight policy gate
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            BASE_REF="${{ github.base_ref }}"
            # Load contract from the trusted base branch, not the PR checkout.
            # Prevents a malicious PR from weakening policy by modifying harness.contract.json.
            CONTRACT_PATH="$RUNNER_TEMP/harness.contract.base.json"
            if ! git show "origin/$BASE_REF:harness.contract.json" > "$CONTRACT_PATH"; then
              echo "::error::Unable to load trusted harness.contract.json from origin/$BASE_REF"
              exit 1
            fi
          else
            BASE_SHA="${{ github.event.merge_group.base_sha }}"
            HEAD_SHA="${{ github.event.merge_group.head_sha }}"
            # Merge queue: contract is committed and protected by branch rules.
            CONTRACT_PATH="harness.contract.json"
          fi
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | paste -sd, -)"
          if [[ -z "$CHANGED_FILES" ]]; then
            CHANGED_FILES="$(git ls-files | paste -sd, -)"
          fi

          node --import tsx src/cli.ts preflight-gate \
            --contract "$CONTRACT_PATH" \
            --max-tier medium \
            --files "${CHANGED_FILES}" \
            --json

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    needs: [risk-policy-gate]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Detect dependency review support
        id: dependency-review-support
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.get({ owner, repo });
            const security = response.data.security_and_analysis ?? {};
            const advanced = security.advanced_security?.status === 'enabled';
            const dependencyGraph = security.dependency_graph?.status === 'enabled';
            core.setOutput('supported', advanced && dependencyGraph ? 'true' : 'false');
      - name: Run dependency review (pull_request)

        if: github.event_name == 'pull_request' && steps.dependency-review-support.outputs.supported == 'true'

        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
      - name: Skip dependency review when repository support is unavailable

        if: github.event_name == 'pull_request' && steps.dependency-review-support.outputs.supported != 'true'

        run: echo "Dependency review unsupported (requires dependency graph + advanced security); skipping."
      - name: Skip dependency review for merge queue
        if: github.event_name == 'merge_group'
        run: echo "Dependency review enforced on pull_request; merge_group runs are no-op."

  actions-pinning:
    name: actions-pinning
    runs-on: ubuntu-latest
    needs: [risk-policy-gate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Enforce pinned GitHub Actions
        shell: bash
        run: |
          set -euo pipefail
          violations=0

          while IFS=: read -r file line raw || [[ -n "$file" ]]; do

            ref="$(printf "%s" "$raw" | sed -E 's/^[[:space:]]*(-[[:space:]]*)?uses:[[:space:]]*([^[:space:]#]+).*/\\2/')"
            if [[ "$ref" == ./* ]] || [[ "$ref" == docker://* ]]; then
              continue
            fi
            if [[ ! "$ref" =~ @[0-9a-f]{40}$ ]]; then
              echo "::error file=$file,line=$line::Action is not pinned to a full commit SHA: $ref"
              violations=1
            fi

          done < <(rg -n "^[[:space:]]*(-[[:space:]]*)?uses:[[:space:]]*[^[:space:]]+" .github/workflows/*.yml 2>/dev/null || true)

          exit "$violations"

  consistency-drift-advisory:
    name: consistency-drift-advisory
    runs-on: ubuntu-latest
    needs: [risk-policy-gate]
    permissions:
      contents: read
      pull-requests: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
{{pnpmSetupStep}}
      - name: Install dependencies
        run: {{installCommand}}
      - name: Prepare baseline seed fallback
        run: |
          mkdir -p artifacts/consistency-gate
          if [[ ! -f artifacts/consistency-gate/consistency-baseline-latest.json ]]; then
            cat > artifacts/consistency-gate/consistency-baseline-latest.json <<'JSON'
          {
            "schemaVersion": "1.0.0",
            "findings": []
          }
          JSON
          fi
      - name: Run advisory drift gate
        run: |

          node --import tsx src/cli.ts drift-gate \
            --mode advisory \
            --json \
            --out artifacts/consistency-gate/consistency-drift-advisory-latest.json
      - name: Advisory guard (soft-fail)
        run: |
          if [[ ! -s artifacts/consistency-gate/consistency-drift-advisory-latest.json ]]; then
            echo "::warning::advisory report missing; writing deterministic fallback report."

            cat > artifacts/consistency-gate/consistency-drift-advisory-latest.json <<'JSON'
          {
            "schemaVersion": "1.0.0",
            "command": "drift-gate",
            "mode": "advisory",
            "status": "blocked",
            "outcome": "error",
            "error_class": "io",
            "generated_at": "1970-01-01T00:00:00.000Z",
            "repo_root": ".",
            "baseline": { "path": "artifacts/consistency-gate/consistency-baseline-latest.json", "loaded": false, "reason": "missing_report_output" },
            "summary": { "finding_count": 1, "new_count": 1, "preexisting_count": 0, "error_count": 1 },
            "findings": [
              {
                "rule_id": "report.output.missing",
                "surface": "status",
                "rule_result": "error",
                "severity": "error",
                "baseline_state": "new",

                "message": "Advisory report missing; generated deterministic fallback report."

              }
            ]
          }
          JSON
          fi
      - name: Upload advisory artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: consistency-drift-advisory-latest
          path: artifacts/consistency-gate/consistency-drift-advisory-latest.json

  consistency-drift-health:
    name: consistency-drift-health
    runs-on: ubuntu-latest
    needs: [risk-policy-gate]
    permissions:
      contents: read
      pull-requests: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
{{pnpmSetupStep}}
      - name: Install dependencies
        run: {{installCommand}}
      - name: Detect baseline seed
        id: baseline-seed
        run: |
          mkdir -p artifacts/consistency-gate
          if [[ -f artifacts/consistency-gate/consistency-baseline-latest.json ]]; then
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "seeded=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run health drift gate
        if: steps.baseline-seed.outputs.seeded == 'true'
        run: |
          node --import tsx src/cli.ts drift-gate \
            --mode health \
            --json \
            --out artifacts/consistency-gate/health.json
      - name: Bootstrap health warning (first-run)
        if: steps.baseline-seed.outputs.seeded != 'true'
        run: |
          cat > artifacts/consistency-gate/health.json <<'JSON'
          {
            "schemaVersion": "1.0.0",
            "command": "drift-gate",
            "mode": "health",
            "status": "partial",
            "outcome": "ok",
            "error_class": "none",
            "generated_at": "1970-01-01T00:00:00.000Z",
            "repo_root": ".",
            "baseline": { "path": "artifacts/consistency-gate/consistency-baseline-latest.json", "loaded": false, "reason": "bootstrap_seed_missing" },
            "summary": { "finding_count": 1, "new_count": 1, "preexisting_count": 0, "error_count": 0 },
            "findings": [
              {
                "rule_id": "baseline.seed.bootstrap",
                "surface": "status",
                "rule_result": "not_applicable",
                "severity": "info",
                "baseline_state": "new",
                "message": "Health check running in bootstrap mode until baseline seed is published on default branch."
              }
            ]
          }
          JSON
          echo "::warning::consistency-drift-health running in bootstrap mode (baseline seed missing)."
      - name: Upload health artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: consistency-drift-health-latest
          path: artifacts/consistency-gate/health.json

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: [risk-policy-gate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
{{pnpmSetupStep}}
      - name: Install dependencies
        run: {{installCommand}}
      - name: Run lint
        run: {{lintCommand}}

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: [risk-policy-gate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
{{pnpmSetupStep}}
      - name: Install dependencies
        run: {{installCommand}}
      - name: Run typecheck
        run: {{typecheckCommand}}

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [risk-policy-gate]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
{{pnpmSetupStep}}
      - name: Install dependencies
        run: {{installCommand}}
      - name: Run tests
        run: {{testCommand}}

  audit:
