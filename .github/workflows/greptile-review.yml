name: Greptile Review

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested]
  merge_group:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

# Skip if the actor is github-actions[bot] to prevent the bot being
# registered as a Greptile developer seat (Greptile bills per GitHub
# identity that interacts with PRs near review time). Only real users
# and the Greptile bot itself should trigger this workflow.

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  statuses: write

jobs:
  greptile-review:
    name: Greptile Review
    runs-on: ubuntu-latest
    # Run for PR events, review events, or when Greptile comments on a PR
    if: |
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'merge_group' ||
        github.event_name == 'pull_request_review' ||
        github.event_name == 'pull_request_review_comment' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          (
            github.event.comment.user.login == 'greptile[bot]' ||
            github.event.comment.user.login == 'greptileai[bot]' ||
            github.event.comment.user.login == 'greptile-apps[bot]' ||
            github.event.comment.user.login == 'greptile' ||
            github.event.comment.user.login == 'greptileai' ||
            github.event.comment.user.login == 'greptile-apps'
          )
        )
      )
    steps:
      - name: Merge queue passthrough
        if: github.event_name == 'merge_group'
        run: echo "Greptile PR-context checks are evaluated on pull_request events."

      - name: Get PR context
        if: github.event_name != 'merge_group'
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const eventName = process.env.EVENT_NAME;
            // For issue_comment, use ISSUE_NUMBER; for PR/review events, use PR_NUMBER
            const prNumber = eventName === 'issue_comment'
              ? process.env.ISSUE_NUMBER
              : process.env.PR_NUMBER;

            if (!prNumber) {
              core.setFailed(`Could not determine PR number for event: ${eventName}`);
              return;
            }

            let headSha;

            if (eventName === 'pull_request') {
              headSha = context.payload.pull_request.head.sha;
            } else {
              // Fetch PR to get head SHA
              const pr = await github.rest.pulls.get({
                owner: process.env.REPO_OWNER,
                repo: process.env.REPO_NAME,
                pull_number: parseInt(prNumber, 10)
              });
              headSha = pr.data.head.sha;
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('head_sha', headSha);
            core.setOutput('repo_owner', process.env.REPO_OWNER);
            core.setOutput('repo_name', process.env.REPO_NAME);

      - name: Analyze Greptile review
        if: github.event_name != 'merge_group'
        id: analyze
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REPO_OWNER: ${{ steps.context.outputs.repo_owner }}
          REPO_NAME: ${{ steps.context.outputs.repo_name }}
          MIN_MERGE_SCORE: '4'
          EVENT_NAME: ${{ github.event_name }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const minMergeScore = parseInt(process.env.MIN_MERGE_SCORE, 10);
            const owner = process.env.REPO_OWNER;
            const repo = process.env.REPO_NAME;
            const eventName = process.env.EVENT_NAME;
            const headSha = process.env.HEAD_SHA;
            const action = context.payload.action || '';

            // Freshness is keyed to PR head SHA, not commit timestamps.
            // Any synchronize event means the head SHA changed and requires a new
            // Greptile comment to complete this check.
            if (eventName === 'pull_request' && action === 'synchronize') {
              core.setOutput('found', 'false');
              core.setOutput('status', 'pending');
              core.setOutput('summary', 'Waiting for Greptile review on the current PR head commit...');
              core.setOutput('comment_url', '');
              core.setOutput('score', '');
              console.log('Head SHA changed via synchronize event; waiting for fresh Greptile review');
              return;
            }

            // Fetch comments on the PR
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber
            });

            const headCommit = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: headSha
            });
            const headCommittedAt = new Date(
              headCommit.data.commit.committer?.date ||
              headCommit.data.commit.author?.date ||
              0
            );

            const greptileLogins = new Set([
              'greptile[bot]',
              'greptileai[bot]',
              'greptile-apps[bot]',
              'greptile',
              'greptileai',
              'greptile-apps'
            ]);

            const greptileComments = comments.data
              .filter(c => {
                if (!(c.user != null && greptileLogins.has(c.user.login))) {
                  return false;
                }

                const body = c.body || '';
                const createdAt = new Date(c.created_at);
                const referencesHeadSha = body.includes(headSha);
                const isAfterHeadCommit = createdAt >= headCommittedAt;

                return referencesHeadSha || isAfterHeadCommit;
              })
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (greptileComments.length === 0) {
              core.setOutput('found', 'false');
              core.setOutput('status', 'pending');
              core.setOutput('summary', 'Waiting for Greptile review on the current PR head commit...');
              core.setOutput('comment_url', '');
              core.setOutput('score', '');
              console.log('No Greptile comments found for the current head commit');
              return;
            }

            const latestComment = greptileComments[0];
            // Safely handle comment body - never log or output raw content
            const commentBody = (latestComment.body || '').toLowerCase();

            core.setOutput('found', 'true');
            core.setOutput('comment_url', latestComment.html_url);

            // Parse the comment for confidence score
            // Greptile typically includes a score like "Confidence: X/5" or "Score: X"
            let score = null;
            const scorePatterns = [
              /(?:confidence|score)[:\s]*(\d)(?:\s*\/\s*5)?/,
              /(\d)\s*\/\s*5.*confidence/,
              /overall[:\s]*(\d)/,
              /rating[:\s]*(\d)/
            ];

            for (const pattern of scorePatterns) {
              const match = commentBody.match(pattern);
              if (match) {
                score = parseInt(match[1], 10);
                break;
              }
            }

            // Check for explicit pass/fail indicators
            const hasApprovalKeywords = /\b(approved?|pass(?:ed|ing)?|lgtm|looks good|ready to merge)\b/.test(commentBody);
            const hasBlockKeywords = /\b(block(?:ed|ing)?|fail(?:ed|ing)?|needs? changes?|do not merge|dnm)\b/.test(commentBody);

            let status;
            let summary;
            let scoreOutput;

            if (score !== null) {
              scoreOutput = score.toString();
              if (score >= minMergeScore) {
                status = 'success';
                summary = `Greptile review passed with confidence score ${score}/5 (threshold: ${minMergeScore}/5)`;
              } else {
                status = 'failure';
                summary = `Greptile review failed with confidence score ${score}/5 (minimum required: ${minMergeScore}/5)`;
              }
            } else if (hasApprovalKeywords && !hasBlockKeywords) {
              status = 'success';
              scoreOutput = 'unknown';
              summary = 'Greptile review indicates approval';
            } else if (hasBlockKeywords) {
              status = 'failure';
              scoreOutput = 'unknown';
              summary = 'Greptile review indicates changes are needed';
            } else {
              // If we can't parse a score, default to success if Greptile commented
              status = 'success';
              scoreOutput = 'unknown';
              summary = 'Greptile review completed (no explicit score detected)';
            }

            // Set outputs without exposing raw comment content
            core.setOutput('status', status);
            core.setOutput('summary', summary);
            core.setOutput('score', scoreOutput);

            console.log(`Analysis complete: status=${status}, score=${scoreOutput}`);



      - name: Finalize workflow check for pull_request events
        if: github.event_name == 'pull_request'
        env:
          STATUS: ${{ steps.analyze.outputs.status }}
          SUMMARY: ${{ steps.analyze.outputs.summary }}
        run: |
          echo "$SUMMARY"

          if [ "$STATUS" = "success" ]; then
            exit 0
          fi

          echo "::error::$SUMMARY"
          exit 1

      - name: Create PR-head check run for Greptile refresh events
        # NOTE: This step is intentionally restricted to pull_request events only.
        # Running checks.create on issue_comment/review events uses GITHUB_TOKEN
        # (github-actions[bot]) which Greptile bills as a developer seat.
        # The pull_request path uses a shell exit code instead of the checks API.
        if: github.event_name == 'pull_request' && steps.analyze.outputs.status != ''
        env:
          STATUS: ${{ steps.analyze.outputs.status }}
          SUMMARY: ${{ steps.analyze.outputs.summary }}
        run: |
          echo "$SUMMARY"
          if [ "$STATUS" = "success" ]; then
            exit 0
          fi
          echo "::error::$SUMMARY"
          exit 1
