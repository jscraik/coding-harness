name: E2E Tests

on:
  schedule:
    # Run E2E tests every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      test_pattern:
        description: "Test pattern to run (e.g., github-integration)"
        required: false
        default: ""
      bail:
        description: "Stop on first failure"
        type: boolean
        default: false
      parallel:
        description: "Number of parallel tests"
        type: number
        default: 2

concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "10.0.0"

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run E2E Tests
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN_E2E }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY_E2E }}
          GITHUB_TEST_OWNER: ${{ vars.GITHUB_TEST_OWNER || 'jscraik' }}
          GITHUB_TEST_REPO: ${{ vars.GITHUB_TEST_REPO || 'coding-harness-e2e-test' }}
          LINEAR_TEST_TEAM: ${{ vars.LINEAR_TEST_TEAM || 'JSC' }}
          E2E_MODE: "true"
          E2E_CLEANUP: "true"
          # User inputs via env vars to prevent command injection
          E2E_PARALLEL: ${{ github.event.inputs.parallel || 2 }}
          E2E_BAIL: ${{ github.event.inputs.bail }}
          E2E_PATTERN: ${{ github.event.inputs.test_pattern }}
        run: |
          ARGS="--reporter json --parallel ${E2E_PARALLEL}"

          if [ "${E2E_BAIL}" == "true" ]; then
            ARGS="$ARGS --bail"
          fi

          if [ -n "${E2E_PATTERN}" ]; then
            ARGS="$ARGS ${E2E_PATTERN}"
          fi

          pnpm e2e $ARGS

      - name: Upload E2E recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-recordings
          path: |
            e2e/recordings/
            e2e/reports/
          retention-days: 30

      - name: Upload E2E coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage
          path: e2e/coverage/
          retention-days: 7

  e2e-test-summary:
    name: E2E Test Summary
    needs: e2e-tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download recordings
        uses: actions/download-artifact@v4
        with:
          name: e2e-recordings
          path: e2e/recordings/

      - name: Generate summary
        run: |
          echo "# E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "✅ All E2E tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ E2E tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Recordings" >> $GITHUB_STEP_SUMMARY
          echo "Download the full E2E test recordings from the artifacts." >> $GITHUB_STEP_SUMMARY

          # Count recordings if they exist
          if [ -d "e2e/recordings" ]; then
            RECORDING_COUNT=$(find e2e/recordings -name "*.json" | wc -l)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Recordings generated: $RECORDING_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
