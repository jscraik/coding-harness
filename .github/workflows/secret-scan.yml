name: Secret Scan

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog OSS
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: >-
            --results=verified,unknown
            --exclude-paths=./.trufflehog-exclude.txt

      - name: Fail on TruffleHog findings
        if: steps.trufflehog.outcome == 'failure'
        run: |
          echo "TruffleHog found secrets. See previous step output for details."
          exit 1
