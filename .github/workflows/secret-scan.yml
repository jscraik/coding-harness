name: security-scan

# Supplementary security scanning workflow.
# CircleCI is the primary PR gate — this workflow is informational only.
# Billing guard: this workflow is toggled via GitHub Actions UI.
# Re-enable after resolving GitHub Actions billing (check Settings → Billing & plans).
on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:

permissions:
  contents: read
  # pull-requests: write — needed for Gitleaks PR comment integration (JSC-115)
  pull-requests: write

jobs:
  secret-scan:
    name: security-scan
    runs-on: ubuntu-latest
    # Continue-on-error ensures billing/infra failures don't block PRs
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: BetterLeaks Scan
        run: |
          set -euo pipefail
          BETTERLEAKS_VERSION="v1.1.1"
          BINDIR="${RUNNER_TEMP}/.local/bin"
          mkdir -p "${BINDIR}"
          curl -fsSL \
            "https://github.com/betterleaks/betterleaks/releases/download/${BETTERLEAKS_VERSION}/betterleaks_1.1.1_linux_x64.tar.gz" \
            | tar xz -C "${BINDIR}" betterleaks
          export PATH="${BINDIR}:${PATH}"
          betterleaks git --redact --verbose .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Semgrep Scan
        run: |
          set -euo pipefail
          python3 -m venv "${RUNNER_TEMP}/semgrep-venv"
          "${RUNNER_TEMP}/semgrep-venv/bin/python" -m pip install --quiet --upgrade pip semgrep==1.153.1
          "${RUNNER_TEMP}/semgrep-venv/bin/semgrep" scan \
            --config p/security-audit \
            --error \
            --severity ERROR \
            --exclude node_modules \
            --exclude dist \
            .
