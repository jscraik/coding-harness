name: Preview Release

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Smoke test
        run: node dist/cli.js --version

      - name: Publish preview
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BASE_VERSION="$(node -p "require('./package.json').version")"
          PREVIEW_VERSION="${BASE_VERSION}-pr.${PR_NUMBER}.${SHORT_SHA}"
          
          node -e "const p=require('./package.json'); p.version='${PREVIEW_VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, '\\t'))"
          
          TARBALL="$(npm pack --silent)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "version=${PREVIEW_VERSION}" >> "$GITHUB_OUTPUT"
          
          pnpm publish --no-git-checks --access restricted --tag preview

      - name: Comment preview link
        if: steps.publish.outputs.version
        uses: actions/github-script@v7
        env:
          PREVIEW_VERSION: ${{ steps.publish.outputs.version }}
          TARBALL: ${{ steps.publish.outputs.tarball }}
        with:
          script: |
            const version = process.env.PREVIEW_VERSION;
            const tarball = process.env.TARBALL;
            const body = `## 📦 Preview Release\n\n` +
              `**Version:** \`${version}\`\n\n` +
              `**Install:**\n` +
              `\`\`\`bash\n` +
              `pnpm add @brainwav/coding-harness@${version}\n` +
              `\`\`\`\n\n` +
              `**Tarball:** \`${tarball}\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
