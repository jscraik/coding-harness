name: Branch Cleanup

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Delete merged branch
        if: github.event_name == 'pull_request'
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "$BRANCH_NAME" && "$BRANCH_NAME" != "main" && "$BRANCH_NAME" != "master" ]]; then
            gh api "repos/$REPO/git/refs/heads/$BRANCH_NAME" -X DELETE || echo "Branch already deleted"
          fi

      - name: Delete stale branches
        if: github.event_name == 'schedule'
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          command -v rg >/dev/null 2>&1 || { echo "rg is required on the runner"; exit 2; }
          git fetch --prune
          for branch in $(git branch -r --merged origin/main | rg -v 'main|master|HEAD' | sed 's/origin\///'); do
            last_commit=$(git log -1 --format=%ci "origin/$branch" 2>/dev/null || echo "")
            if [[ -n "$last_commit" ]]; then
              age_days=$(( ( $(date +%s) - $(date -d "$last_commit" +%s) ) / 86400 ))
              if [[ $age_days -gt 30 ]]; then
                echo "Deleting stale branch: $branch (last commit: $last_commit)"
                gh api "repos/$REPO/git/refs/heads/$branch" -X DELETE || true
              fi
            fi
          done
