name: Harness PR Pipeline

on: pull_request

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-template:
    name: pr-template
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template completion
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? '';
            const errors = [];

            if (body.trim().length === 0) {
              errors.push('PR body is empty. Fill out the full PR template.');
            }

            const requiredSections = [
              '## Summary',
              '## Checklist',
              '## Testing',
              '## Review artifacts',
              '## Notes',
            ];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push('Missing required section: ' + section);
              }
            }

            const checklistMatch = body.match(/## Checklist([\s\S]*?)(?:\n## |\n# |$)/i);
            if (!checklistMatch) {
              errors.push('Missing checklist block.');
            } else {
              const checklistBody = checklistMatch[1] ?? '';
              const checklistItems = checklistBody
                .split('\n')
                .map((line) => line.trim())
                .filter((line) => /^- \[[ xX]\]/.test(line));

              if (checklistItems.length === 0) {
                errors.push('Checklist has no checkbox items.');
              }

              const unchecked = checklistItems.filter((line) => /^- \[ \]/.test(line));
              if (unchecked.length > 0) {
                errors.push(
                  'Checklist has unchecked item(s):\n' + unchecked.join('\n'),
                );
              }
            }

            const placeholders = [
              'pass/fail',
              '<link / artifact path / comment ID>',
              'Add one-paragraph merge rationale here.',
            ];
            for (const placeholder of placeholders) {
              if (body.includes(placeholder)) {
                errors.push('Replace template placeholder: ' + placeholder);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run tests
        run: pnpm test

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run audit
        run: pnpm audit

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run full check
        run: pnpm check

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Run Trivy filesystem scan
        run: trivy fs --severity HIGH,CRITICAL --exit-code 1 --no-progress .
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
      - name: Run Semgrep scan
        run: semgrep scan --error --config p/security-audit --exclude node_modules .
      - name: Run Senvar scan (optional)
        run: |
          if command -v senvar >/dev/null 2>&1; then
            senvar scan .
          else
            echo "senvar not installed on runner; skipping."
          fi

  memory:
    name: memory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate memory.json
        run: test -f memory.json && jq -e '.meta.version == "1.0" and (.preamble.bootstrap | type == "boolean") and (.preamble.search | type == "boolean") and (.entries | type == "array")' memory.json >/dev/null
