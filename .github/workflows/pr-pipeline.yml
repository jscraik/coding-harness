name: Harness PR Pipeline

on: pull_request

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-template:
    name: pr-template
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template completion
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? '';
            const errors = [];

            if (body.trim().length === 0) {
              errors.push('PR body is empty. Fill out the full PR template.');
            }

            const requiredSections = [
              '## Summary',
              '## Checklist',
              '## Testing',
              '## Review artifacts',
              '## Notes',
            ];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push('Missing required section: ' + section);
              }
            }

            const checklistMatch = body.match(/## Checklist([\s\S]*?)(?:\n## |\n# |$)/i);
            if (!checklistMatch) {
              errors.push('Missing checklist block.');
            } else {
              const checklistBody = checklistMatch[1] ?? '';
              const checklistItems = checklistBody
                .split('\n')
                .map((line) => line.trim())
                .filter((line) => /^- \[[ xX]\]/.test(line));

              if (checklistItems.length === 0) {
                errors.push('Checklist has no checkbox items.');
              }

              const unchecked = checklistItems.filter((line) => /^- \[ \]/.test(line));
              if (unchecked.length > 0) {
                errors.push(
                  'Checklist has unchecked item(s):\n' + unchecked.join('\n'),
                );
              }
            }

            const placeholders = [
              'pass/fail',
              '<link / artifact path / comment ID>',
              'Add one-paragraph merge rationale here.',
            ];
            for (const placeholder of placeholders) {
              if (body.includes(placeholder)) {
                errors.push('Replace template placeholder: ' + placeholder);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }

  dependency-chain:
    name: dependency-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.5"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Install Ralph runtime (canonical + opt-in fallback)
        env:
          HARNESS_ALLOW_RALPH_PIPX_FALLBACK: ${{ vars.HARNESS_ALLOW_RALPH_PIPX_FALLBACK || 'false' }}
        run: |
          mkdir -p artifacts/policy
          if uv tool install "ralph-gold==0.8.1"; then
            exit 0
          fi

          if [ "${HARNESS_ALLOW_RALPH_PIPX_FALLBACK}" != "true" ]; then
            echo "uv install failed and HARNESS_ALLOW_RALPH_PIPX_FALLBACK is not enabled."
            exit 1
          fi

          python -m pip install --upgrade pip pipx
          export PATH="$HOME/.local/bin:$PATH"
          python -m pipx install "ralph-gold==0.8.1" --force

          cat > "artifacts/policy/ralph-fallback-warning.json" <<JSON
          {
            "warning": "ralph_runtime_fallback",
            "reason": "uv_tool_install_failed",
            "fallback": "pipx",
            "package": "ralph-gold==0.8.1",
            "optInEnv": "HARNESS_ALLOW_RALPH_PIPX_FALLBACK",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          JSON
      - name: Verify dependency chain
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          python3 --version
          uv --version
          ralph --version
          case "$(ralph --version)" in
            *"0.8.1"*) ;;
            *) echo "Pinned Ralph version 0.8.1 not found"; exit 1 ;;
          esac
      - name: Upload dependency policy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-artifacts
          path: artifacts/policy/
          if-no-files-found: ignore

  risk-policy-gate:
    name: risk-policy-gate
    needs: [pr-template, dependency-chain]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Enforce docs drift baseline
        run: pnpm docs:lint
      - name: Run risk-policy gate
        run: |
          CHANGED_FILES="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | paste -sd, -)"
          npx tsx src/cli.ts risk-policy-gate --contract harness.contract.json --files "$CHANGED_FILES" --max-tier medium

  review-gate:
    name: review-gate
    needs: [risk-policy-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run review gate against current SHA
        run: |
          npx tsx src/cli.ts review-gate \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --sha "${{ github.event.pull_request.head.sha }}" \
            --check "risk-policy-gate" \
            --contract harness.contract.json

  evidence-verify:
    name: evidence-verify
    needs: [review-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Capture browser evidence fixture
        run: |
          mkdir -p artifacts/evidence
          cat <<'PNG_BASE64' | base64 --decode > artifacts/evidence/loop-stage-smoke.png
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO5s6wAAAABJRU5ErkJggg==
          PNG_BASE64
      - name: Verify evidence contract
        run: |
          CHANGED_FILES="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | paste -sd, -)"
          npx tsx src/cli.ts evidence-verify --contract harness.contract.json --files artifacts/evidence/loop-stage-smoke.png --changed "$CHANGED_FILES"
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence-artifacts
          path: artifacts/evidence/
          if-no-files-found: error

  remediation-decision:
    name: remediation-decision
    needs: [evidence-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run remediation-decision stage (plan only)
        run: |
          mkdir -p artifacts/remediation
          echo "[]" > artifacts/remediation/findings.json
          npx tsx src/cli.ts remediate run --findings artifacts/remediation/findings.json --contract harness.contract.json --mode run --json
      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remediation-decision-artifacts
          path: artifacts/remediation/
          if-no-files-found: error

  lint:
    name: lint
    needs: [pr-template, dependency-chain, remediation-decision]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm lint

  typecheck:
    name: typecheck
    needs: [pr-template, dependency-chain, remediation-decision]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: test
    needs: [pr-template, dependency-chain, remediation-decision]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run tests
        run: pnpm test

  audit:
    name: audit
    needs: [pr-template, dependency-chain, remediation-decision]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run audit
        run: pnpm audit

  check:
    name: check
    needs: [pr-template, dependency-chain, remediation-decision]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run full check
        run: pnpm check

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Run Trivy filesystem scan
        run: trivy fs --severity HIGH,CRITICAL --exit-code 1 --no-progress .
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
      - name: Run Semgrep scan
        run: semgrep scan --error --config p/security-audit --exclude node_modules .
      - name: Run Senvar scan (optional)
        run: |
          if command -v senvar >/dev/null 2>&1; then
            senvar scan .
          else
            echo "senvar not installed on runner; skipping."
          fi

  memory:
    name: memory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate memory.json
        run: test -f memory.json && jq -e '.meta.version == "1.0" and (.preamble.bootstrap | type == "boolean") and (.preamble.search | type == "boolean") and (.entries | type == "array")' memory.json >/dev/null
