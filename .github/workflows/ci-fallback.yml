name: ci-fallback

# Emergency fallback CI. CircleCI is the primary PR gate (see docs/ci-responsibility-matrix.md).
# This workflow is intentionally restricted to workflow_dispatch only.
# Re-enable automatic triggers ONLY if CircleCI runner capacity becomes unavailable.
# To re-enable: restore pull_request, push (not main), and merge_group triggers.
#
# NOTE: Renamed from pr-pipeline-bridge.yml to ci-fallback.yml to break GitHub's
# cached workflow trigger registration (JSC-101). The old filename was still firing
# on push events despite being workflow_dispatch-only in the YAML.
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-fallback-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-pipeline:
    name: ci/circleci: pr-pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run canonical check suite
        run: pnpm check
