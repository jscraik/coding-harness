name: Auto release and publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: Optional standard-version bump type (patch/minor/major)
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  post-merge-review-gate:
    name: post-merge-review-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
        id: pnpm-cache
      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: pnpm build
      - name: Resolve merged PR metadata for pushed commit
        id: resolve-pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const commitSha = context.sha;
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
            });
            const mergedPr = response.data.find(
              (pr) => Boolean(pr.merged_at) && pr.base?.ref === context.ref.replace("refs/heads/", ""),
            );
            if (!mergedPr) {
              core.info(`No merged PR associated with commit ${commitSha}; skipping post-merge review-gate.`);
              core.setOutput("run_gate", "false");
              return;
            }
            core.info(`Resolved merged PR #${mergedPr.number} with head SHA ${mergedPr.head.sha}`);
            core.setOutput("run_gate", "true");
            core.setOutput("pr_number", String(mergedPr.number));
            core.setOutput("head_sha", mergedPr.head.sha);
      - name: Run review-gate against finalized check runs
        id: review-gate
        if: steps.resolve-pr.outputs.run_gate == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          node dist/cli.js review-gate \
            --token "$GITHUB_TOKEN" \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --pr "${{ steps.resolve-pr.outputs.pr_number }}" \
            --sha "${{ steps.resolve-pr.outputs.head_sha }}" \
            --check "Greptile Review" \
            --contract "harness.contract.json" \
            --bot-login "greptile-apps" \
            --auto-resolve-bot-threads \
            --json
          STATUS=$?
          if [ "$STATUS" -eq 1 ]; then
            echo "::warning::post-merge review-gate reported merged-PR follow-up work; continuing with release because main has already passed the release candidate checks."
            exit 0
          fi
          exit "$STATUS"

  auto-release:
    needs: post-merge-review-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
        id: pnpm-cache
      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate release candidate
        run: pnpm check
      - name: Smoke test packed CLI artifact
        run: |
          set -euo pipefail
          command -v rg >/dev/null 2>&1 || { echo "rg is required on the runner"; exit 2; }
          TARBALL="$(npm pack --silent)"
          TMP_DIR="$(mktemp -d)"
          npm init -y --prefix "$TMP_DIR" >/dev/null 2>&1
          npm install --prefix "$TMP_DIR" "./$TARBALL" >/dev/null
          "$TMP_DIR/node_modules/.bin/harness" --version | tee "$TMP_DIR/version.txt"
          rg -q '^harness v[0-9]+\.[0-9]+\.[0-9]+' "$TMP_DIR/version.txt"
          node "$TMP_DIR/node_modules/@brainwav/coding-harness/dist/cli.js" --version
      - name: Create release commit and tag
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          RELEASE_AS="${{ github.event.inputs.release_as }}"
          if [ -n "$RELEASE_AS" ]; then
            pnpm release -- --release-as "$RELEASE_AS"
          else
            pnpm release
          fi
      - name: Normalize release commit formatting
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          pnpm exec biome format package.json --write
          if ! git diff --quiet -- package.json; then
            git add package.json
            git commit --amend --no-edit
          fi
          VERSION="$(node -p "require('./package.json').version")"
          git tag -f "v${VERSION}"
      - name: Push release commit and tag
        run: git push --follow-tags origin HEAD:${{ github.ref_name }}
