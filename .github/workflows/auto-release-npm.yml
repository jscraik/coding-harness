name: Auto release and publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: Optional standard-version bump type (patch/minor/major)
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate release candidate
        run: pnpm check
      - name: Create release commit and tag
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          RELEASE_AS="${{ github.event.inputs.release_as }}"
          if [ -n "$RELEASE_AS" ]; then
            pnpm release -- --release-as "$RELEASE_AS"
          else
            pnpm release
          fi
      - name: Normalize release commit formatting
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          pnpm exec biome format package.json --write
          if ! git diff --quiet -- package.json; then
            git add package.json
            git commit --amend --no-edit
          fi
      - name: Push release commit and tag
        run: git push --follow-tags origin HEAD:${{ github.ref_name }}
