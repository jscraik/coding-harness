name: Gardener

on:
  schedule:
    - cron: "0 2 * * *"  # 2am UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  garden:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Run gardener analysis
        id: gardener-analysis
        run: node dist/cli.js gardener --json --dry-run > gardener-report.json || true
        env:
          DOCS_PATH: docs

      - name: Check for issues
        id: check-issues
        run: |
          if [ -f "gardener-report.json" ]; then
            STALE_COUNT=$(jq -r '.staleDocs | length' gardener-report.json)
            BROKEN_COUNT=$(jq -r '.brokenLinks | length' gardener-report.json)
            NEEDS_PR=$(jq -r '.needsPR' gardener-report.json)
            echo "Stale docs: $STALE_COUNT"
            echo "Broken links: $BROKEN_COUNT"
            echo "Needs PR: $NEEDS_PR"
            if [ "$NEEDS_PR" = "true" ]; then
              echo "needs_pr=true" >> "$GITHUB_OUTPUT"
            else
              echo "needs_pr=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create maintenance PR
        if: steps.check-issues.outputs.needs_pr == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GARDENER_TOKEN || github.token }}
        run: |
          BRANCH_NAME="gardener/$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          node dist/cli.js gardener --json || true
          git add docs/QUALITY_SCORE.md
          if git diff --cached --quiet; then
            echo "No gardener changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: gardening updates ($(date +%Y-%m-%d))"
          git push -u origin "$BRANCH_NAME"
          gh pr create --title "docs: gardening updates" --body "Automated gardening updates from harness gardener workflow" || echo "PR creation not permitted for this token"
