name: Stale Management

on:
  schedule:
    - cron: "30 1 * * *" # Run at 1:30 UTC daily
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs.
          close-issue-message: |
            This issue was closed because it has been stalled for too long with no activity.
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: "stale"

          # Pull Requests
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs.
          close-pr-message: |
            This PR was closed because it has been stalled for too long with no activity.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"

          # Exemptions
          exempt-issue-labels: "pinned,security,help-wanted,good-first-issue"
          exempt-pr-labels: "pinned,security,work-in-progress"
          exempt-all-milestones: true
