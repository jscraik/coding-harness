name: Automation

on:
  workflow_dispatch:
    inputs:
      automation-name:
        description: 'Automation to run'
        required: true
        type: choice
        options:
          - drift-check
          - pulse
          - upskill
          - green-prs

permissions:
  contents: read

concurrency:
  group: automation-${{ github.repository }}-${{ inputs.automation-name }}
  cancel-in-progress: false

jobs:
  automation:
    name: ${{ inputs.automation-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run automation idempotently
        env:
          AUTOMATION_NAME: ${{ inputs.automation-name }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          mkdir -p artifacts/automation
          INPUT_FINGERPRINT="$(printf "%s" "${REPO}:${HEAD_SHA}:${AUTOMATION_NAME}" | sha256sum | awk '{print $1}')"
          npx tsx src/cli.ts automation-run \
            --name "${AUTOMATION_NAME}" \
            --repo "${REPO}" \
            --head-sha "${HEAD_SHA}" \
            --contract-version "1.2.0" \
            --input-fingerprint "${INPUT_FINGERPRINT}" \
            --artifacts-dir artifacts/automation \
            --json
      - name: Upload automation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.automation-name }}-artifacts
          path: artifacts/automation/
          if-no-files-found: error
