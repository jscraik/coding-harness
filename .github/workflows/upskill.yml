name: Upskill Automation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upskill-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  upskill:
    name: upskill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install
      - name: Run upskill automation idempotently
        run: |
          mkdir -p artifacts/automation
          INPUT_FINGERPRINT="$(printf "%s" "${{ github.repository }}:${{ github.sha }}:upskill" | sha256sum | awk '{print $1}')"
          npx tsx src/cli.ts automation-run \
            --name upskill \
            --repo "${{ github.repository }}" \
            --head-sha "${{ github.sha }}" \
            --contract-version "1.2.0" \
            --input-fingerprint "${INPUT_FINGERPRINT}" \
            --artifacts-dir artifacts/automation \
            --json
      - name: Upload upskill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upskill-automation-artifacts
          path: artifacts/automation/
          if-no-files-found: error
