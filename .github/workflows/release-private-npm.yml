name: Release to private npm

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "release" to publish the current tag on disk
        required: true
        default: ""
      publish_auth:
        description: Auth mode for publish (`token` for bootstrap, `oidc` for trusted publisher)
        required: false
        default: "oidc"
        type: choice
        options:
          - token
          - oidc

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.confirm == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release candidate
        run: pnpm check

      - name: Build package
        run: pnpm build

      - name: Generate SBOM
        # Continue on error since cyclonedx-npm may fail with pnpm overrides
        continue-on-error: true
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file artifacts/sbom.cdx.json
        working-directory: ${{ github.workspace }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: artifacts/sbom.cdx.json
          retention-days: 90

      - name: Smoke test packed CLI artifact
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --silent)"
          TMP_DIR="$(mktemp -d)"
          npm init -y --prefix "$TMP_DIR" >/dev/null 2>&1
          npm install --prefix "$TMP_DIR" "./$TARBALL" >/dev/null
          "$TMP_DIR/node_modules/.bin/harness" --version | tee "$TMP_DIR/version.txt"
          grep -Eq '^harness v[0-9]+\.[0-9]+\.[0-9]+' "$TMP_DIR/version.txt"
          node "$TMP_DIR/node_modules/@brainwav/coding-harness/dist/cli.js" --version

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v${PKG_VERSION} does not match package.json version ${TAG_VERSION}"
            exit 1
          fi

      - name: Verify publish auth mode
        id: publish-auth
        run: |
          MODE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_auth || vars.NPM_PUBLISH_AUTH || 'token' }}"
          if [[ -z "$MODE" ]]; then
            MODE="token"
          fi
          if [[ "$MODE" != "token" && "$MODE" != "oidc" ]]; then
            echo "::error::Unsupported publish_auth mode '$MODE'. Expected token or oidc."
            exit 1
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: Publish private package (token)
        if: steps.publish-auth.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks --access restricted

      - name: Publish private package (OIDC trusted publisher)
        if: steps.publish-auth.outputs.mode == 'oidc'
        run: pnpm publish --no-git-checks --access restricted --provenance

      - name: Generate attestations
        if: steps.publish-auth.outputs.mode == 'oidc'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TARBALL="brainwav-coding-harness-${VERSION}.tgz"
          if [[ -f "$TARBALL" ]]; then
            gh attestation verify "$TARBALL" --repo "${{ github.repository }}" || true
          fi

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file CHANGELOG.md \
            --latest || echo "Release already exists"
