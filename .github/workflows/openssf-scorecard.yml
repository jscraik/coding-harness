name: openssf-scorecard

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  scorecard:
    name: openssf-scorecard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          results_file: artifacts/openssf-scorecard-results.json
          results_format: json
          publish_results: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Enforce scorecard regression policy
        env:
          SCORECARD_MODE: ${{ github.event_name == 'pull_request' && 'warn' || 'fail' }}
        run: |
          set -euo pipefail
          node scripts/check-scorecard-regressions.mjs \
            --results artifacts/openssf-scorecard-results.json \
            --policy security/openssf-scorecard-policy.json \
            --mode "${SCORECARD_MODE}"

      - name: Upload scorecard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: openssf-scorecard-results
          path: artifacts/openssf-scorecard-results.json
