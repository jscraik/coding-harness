version = 1
name = "harness local environment"

[setup]
script = '''
set -euo pipefail

PATH="${PATH:-/usr/bin:/bin}"
home_dir="${HOME:-}"
for candidate in "/sbin" "/usr/sbin" "/usr/local/bin" "/opt/homebrew/sbin" "/opt/homebrew/bin" "${home_dir:+$home_dir/.local/bin}" "${home_dir:+$home_dir/.local/share/mise/shims}"; do
  [[ -n "$candidate" ]] || continue
  if [[ -d "$candidate" && ":$PATH:" != *":$candidate:"* ]]; then
    PATH="$candidate:$PATH"
  fi
done
export PATH

if command -v mise >/dev/null 2>&1; then
  mise trust --yes .mise.toml || true
  mise install
fi
if [[ -f scripts/prepare-worktree.sh ]]; then
  bash scripts/prepare-worktree.sh
else
  pnpm install
fi
'''

