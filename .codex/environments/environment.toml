[[actions]]
name = "Mise"
icon = "tool"
command = '''
set -euo pipefail

command -v mise >/dev/null 2>&1
if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  current_branch="$(git symbolic-ref --short -q HEAD || true)"
  if [ -z "$current_branch" ]; then
    repo_slug="$(basename "$PWD" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
    if [ -z "$repo_slug" ]; then
      repo_slug="worktree"
    fi
    short_sha="$(git rev-parse --short HEAD)"
    branch_base="${BRANCH_PREFIX:-jscraik/feature}/$repo_slug-worktree-$short_sha"
    branch_name="$branch_base"
    suffix=1
    while git show-ref --verify --quiet "refs/heads/$branch_name"; do
      branch_name="$branch_base-$suffix"
      suffix=$((suffix + 1))
    done
    echo "[codex] detached HEAD detected; creating branch $branch_name"
    git switch -c "$branch_name"
    if git show-ref --verify --quiet "refs/remotes/origin/main"; then
      git branch --set-upstream-to=origin/main "$branch_name" >/dev/null 2>&1 || true
      echo "[codex] tracking origin/main for $branch_name"
      target_ref="origin/main"
      if git fetch --quiet origin main; then
        target_ref="FETCH_HEAD"
      else
        echo "[codex] could not fetch origin/main; using cached origin/main"
      fi
      if git merge-base --is-ancestor HEAD "$target_ref"; then
        echo "[codex] fast-forwarding $branch_name with origin/main"
        git merge --ff-only "$target_ref"
      else
        echo "[codex] $branch_name diverges from origin/main; skipping fast-forward"
      fi
    fi
  fi
fi
mise trust --yes .mise.toml || true
mise install
'''

