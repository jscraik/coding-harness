# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "harness local environment"

[setup]
script = '''
set -euo pipefail

echo "[codex] setup: $(pwd)"

export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.local/share/mise/shims:$HOME/.local/bin:$PATH"

if command -v mise >/dev/null 2>&1; then
  eval "$(mise activate bash)" >/dev/null 2>&1 || true
fi

missing_tools=0

require_tool() {
  local cmd="$1"
  local hint="$2"
  if ! command -v "$cmd" >/dev/null 2>&1; then
    echo "[codex] missing required tool: ${cmd} (${hint})"
    missing_tools=1
  fi
}

require_tool git "install Git and ensure it is on PATH"
require_tool rg "install ripgrep (rg)"
require_tool jq "install jq"
if ! command -v fd >/dev/null 2>&1 && ! command -v fdfind >/dev/null 2>&1; then
  echo "[codex] missing required tool: fd (or fdfind)"
  missing_tools=1
fi
require_tool node "install Node.js runtime"
if ! command -v pnpm >/dev/null 2>&1 && ! command -v corepack >/dev/null 2>&1 && [ ! -x /opt/homebrew/bin/pnpm ]; then
  echo "[codex] missing required tool: pnpm (or corepack with pnpm support)"
  missing_tools=1
fi
require_tool python3 "install Python 3 runtime"
require_tool uv "install uv package manager"
require_tool rustup "install rustup toolchain manager"
require_tool rustc "install Rust compiler (rustc)"
require_tool cargo "install Rust toolchain (cargo)"

if [ "$missing_tools" -ne 0 ]; then
  echo "[codex] tooling check failed; install missing tools before continuing."
  exit 1
fi

mise trust && mise install

run_pnpm() {
  if command -v pnpm >/dev/null 2>&1; then
    pnpm "$@"
    return
  fi

  if [ -x /opt/homebrew/bin/pnpm ]; then
    /opt/homebrew/bin/pnpm "$@"
    return
  fi

  if command -v corepack >/dev/null 2>&1; then
    corepack enable >/dev/null 2>&1 || true
    corepack pnpm "$@"
    return
  fi

  echo "[codex] pnpm is not available in this environment"
  return 127
}

TOOL_VERSION_REPORT_SCRIPT="${TMPDIR:-/tmp}/codex-tool-version-report.sh"
cat >"$TOOL_VERSION_REPORT_SCRIPT" <<'SCRIPT'
#!/usr/bin/env bash
set -euo pipefail

export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.local/share/mise/shims:$HOME/.local/bin:$PATH"

if command -v mise >/dev/null 2>&1; then
  eval "$(mise activate bash)" >/dev/null 2>&1 || true
fi

echo "git: $(git --version 2>/dev/null || echo missing)"
echo "rg: $(rg --version 2>/dev/null | head -n 1 || echo missing)"
echo "jq: $(jq --version 2>/dev/null || echo missing)"
if command -v fd >/dev/null 2>&1; then
  echo "fd: $(fd --version 2>/dev/null | head -n 1)"
elif command -v fdfind >/dev/null 2>&1; then
  echo "fd: $(fdfind --version 2>/dev/null | head -n 1) (via fdfind)"
else
  echo "fd: missing"
fi
echo "node: $(node --version 2>/dev/null || echo missing)"
if command -v pnpm >/dev/null 2>&1; then
  echo "pnpm: $(pnpm --version 2>/dev/null)"
elif [ -x /opt/homebrew/bin/pnpm ]; then
  echo "pnpm: $(/opt/homebrew/bin/pnpm --version 2>/dev/null) (via /opt/homebrew/bin/pnpm)"
elif command -v corepack >/dev/null 2>&1; then
  echo "pnpm: available via corepack"
else
  echo "pnpm: missing"
fi
echo "python3: $(python3 --version 2>/dev/null || echo missing)"
echo "uv: $(uv --version 2>/dev/null || echo missing)"
echo "rustup: $(rustup --version 2>/dev/null | head -n 1 || echo missing)"
echo "rustc: $(rustc --version 2>/dev/null || echo missing)"
echo "cargo: $(cargo --version 2>/dev/null || echo missing)"
SCRIPT
chmod +x "$TOOL_VERSION_REPORT_SCRIPT"

run_pnpm install --frozen-lockfile || run_pnpm install
'''

