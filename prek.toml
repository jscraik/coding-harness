# Prek configuration (Rust-based pre-commit replacement)
# Install prek: mise install cargo-prek || cargo install prek
# Run: bash scripts/run-prek.sh install --overwrite

default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "pre-commit"
name = "Pre-commit"
entry = "make hooks-pre-commit"
language = "system"
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "pre-push"
name = "Pre-push"
entry = "make hooks-pre-push"
language = "system"
pass_filenames = false
stages = ["pre-push"]
