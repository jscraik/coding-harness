epic:
  title: AI Delivery Harness Cockpit Productization
  objective: Turn Coding Harness from an expert command toolbox into a guided AI delivery cockpit that orients, proves, repairs, reviews, and hands off agent work with portable package-installed proof.
  product_outcome: A dropped-in agent can start from harness next --json, discover the correct lane, run public installed commands, recover from stale context or failed evidence, and produce traceable handoff without user stitching.
  north_star_metric:
    primary: PR lead time from open to merge
    guardrails:
      - review/rework retries per PR
      - manual interventions per agent-driven change
      - merge-readiness block time
      - post-guardrail recurrence rate
  labels:
    - synaipse
    - ai-delivery-harness
    - cockpit
    - agent-native
    - productization
issues:
  - title: Add installed-package downstream portability gate
    linear_issue: JSC-403
    linear_url: https://linear.app/jscraik/issue/JSC-403/coding-harness-add-installed-package-downstream-portability-gate
    priority: P0
    type: feature
    labels:
      - portability
      - package-canary
      - release-gate
      - agent-native
      - evals
    depends_on: []
    source_trace_id: portability-canary-gate
    intent: Prove the public installed package works from a downstream repo before adding more agent-native ratchets or advisory packet surfaces.
    problem: Recent review loops repeatedly found source-repo assumptions around package scripts, relative script paths, schema/type drift, and commands that worked locally but failed from installed downstream repos.
    scope_in:
      - Create deterministic downstream repo fixture or temp repo canary.
      - Install or execute the built package as a consumer would.
      - Run the canonical public command list from the downstream cwd.
      - Emit a machine-readable canary result artifact.
      - Fail closed when public commands regress.
    scope_out:
      - Publishing to npm.
      - Changing external CI required checks unless a later slice promotes the gate.
      - Adding new ratchet packet types.
    canary_commands:
      - harness next --json
      - harness commands --json --for-agent
      - harness session-distill --json
      - harness agent-native-ratchets --json
      - harness agent-rework --json
      - harness reviewer-decision --json
      - harness init --dry-run --json
    acceptance_criteria:
      - A clean downstream fixture can run every canary command from the downstream cwd.
      - Commands use public harness entrypoints rather than source checkout-only package scripts.
      - Missing optional evidence returns structured degraded state.
      - No command resolves package-owned scripts relative to the downstream repo.
      - A result artifact records command, exit code, stdout parse status, stderr summary, and failure class.
      - The gate can run locally and in CI without external credentials.
    validation_placeholders:
      focused:
        - pnpm exec vitest run src/dev/package-files-quality-scripts.test.ts
        - pnpm exec vitest run <new downstream portability test>
        - node --import tsx scripts/run-harness-evals.mjs --scenario package-installed-downstream-canary
      broad:
        - pnpm run contracts:runtime-packets
        - pnpm artifact:types
        - bash scripts/validate-codestyle.sh --fast
